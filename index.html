<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>Bewerbung — Mariana Cannabis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter+Tight:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  /* Earth tones — gedämpftes Olivgrün als Anker */
  --olive-900: #2c3320;
  --olive-700: #4a5a32;
  --olive-500: #6b7a4a;
  --olive-300: #a8b386;
  --olive-100: #e3e6d3;
  --olive-50: #f0f2e3;

  /* Sand-Hintergründe */
  --sand-50: #faf6ed;
  --sand-100: #f5efe0;
  --sand-200: #ebe2cb;
  --sand-300: #d8c9a3;

  /* Akzente */
  --terracotta: #c87a5a;
  --terracotta-dark: #9c5b3f;
  --cream: #fdfaf2;
  --ink: #2a2a26;
  --ink-soft: #5a5a52;
  --ink-mute: #8b8b80;

  /* Funktional */
  --error: #b54545;
  --error-bg: #fbe9e7;
  --success: #4a7a3a;
  --success-bg: #e8f0db;
  --warning-bg: #faf2dd;
  --warning-text: #7a5a1a;

  /* Layout */
  --radius-sm: 4px;
  --radius-md: 8px;
  --radius-lg: 14px;
  --shadow-soft: 0 1px 3px rgba(44, 51, 32, 0.06), 0 4px 12px rgba(44, 51, 32, 0.04);
  --shadow-focus: 0 0 0 3px rgba(107, 122, 74, 0.18);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
  font-weight: 400;
  line-height: 1.55;
  color: var(--ink);
  background: var(--sand-50);
  -webkit-font-smoothing: antialiased;
  font-size: 16px;
}

/* Subtile organische Hintergrund-Textur */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle at 15% 25%, rgba(168, 179, 134, 0.08) 0%, transparent 45%),
                    radial-gradient(circle at 85% 75%, rgba(200, 122, 90, 0.05) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

[dir="rtl"] {
  direction: rtl;
}

/* Header */
.app-header {
  position: relative;
  z-index: 1;
  padding: 2rem 1.5rem 1.5rem;
  border-bottom: 1px solid var(--sand-200);
  background: var(--cream);
}

.app-header-inner {
  max-width: 760px;
  margin: 0 auto;
  display: flex;
  align-items: flex-start;
  gap: 1.5rem;
  flex-wrap: wrap;
}

.brand-block {
  flex: 1;
  min-width: 200px;
}

.brand-name {
  font-family: 'DM Serif Display', serif;
  font-size: 1.65rem;
  font-weight: 400;
  color: var(--olive-900);
  margin: 0 0 0.15rem;
  line-height: 1.1;
  letter-spacing: -0.01em;
}

.brand-subtitle {
  font-size: 0.9rem;
  color: var(--olive-700);
  font-style: italic;
  margin: 0;
}

.lang-switcher {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.lang-label {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-mute);
}

.lang-select {
  font-family: inherit;
  font-size: 0.9rem;
  padding: 0.4rem 0.7rem;
  border: 1px solid var(--sand-300);
  border-radius: var(--radius-md);
  background: var(--cream);
  color: var(--ink);
  cursor: pointer;
  transition: border-color 0.15s ease;
}

.lang-select:hover { border-color: var(--olive-500); }
.lang-select:focus {
  outline: none;
  border-color: var(--olive-700);
  box-shadow: var(--shadow-focus);
}

/* Main Container */
.app-main {
  position: relative;
  z-index: 1;
  max-width: 760px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
}

.intro {
  font-size: 1rem;
  color: var(--ink-soft);
  margin: 0 0 2.5rem;
  line-height: 1.65;
}

/* Progress Bar */
.progress {
  margin-bottom: 2.5rem;
  background: var(--cream);
  border-radius: var(--radius-lg);
  padding: 1rem 1.25rem;
  border: 1px solid var(--sand-200);
}

.progress-text {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 0.6rem;
  font-size: 0.85rem;
  color: var(--ink-soft);
}

.progress-text strong {
  font-weight: 500;
  color: var(--olive-700);
}

.progress-bar {
  height: 4px;
  background: var(--sand-200);
  border-radius: 999px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--olive-500), var(--olive-700));
  border-radius: 999px;
  transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Section Card */
.section {
  display: none;
  background: var(--cream);
  border: 1px solid var(--sand-200);
  border-radius: var(--radius-lg);
  padding: 2.5rem 2rem;
  box-shadow: var(--shadow-soft);
  animation: fadeIn 0.4s ease;
}

.section.active { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.section-title {
  font-family: 'DM Serif Display', serif;
  font-size: 2rem;
  font-weight: 400;
  color: var(--olive-900);
  margin: 0 0 0.75rem;
  letter-spacing: -0.015em;
  line-height: 1.15;
}

.section-description {
  font-size: 0.95rem;
  color: var(--ink-soft);
  margin: 0 0 2rem;
  line-height: 1.65;
  max-width: 60ch;
}

.section-subtitle {
  font-family: 'DM Serif Display', serif;
  font-size: 1.25rem;
  font-weight: 400;
  color: var(--olive-700);
  margin: 2.5rem 0 1rem;
  font-style: italic;
}

.section-subtitle:first-of-type { margin-top: 0; }

/* Form Elements */
.form-group {
  margin-bottom: 1.5rem;
}

.form-label {
  display: block;
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 0.5rem;
  letter-spacing: 0.005em;
}

.form-label .required { color: var(--terracotta-dark); margin-left: 2px; }

.form-hint {
  font-size: 0.825rem;
  color: var(--ink-mute);
  margin-top: 0.35rem;
  margin-bottom: 0;
  line-height: 1.5;
}

.form-input,
.form-select,
.form-textarea {
  width: 100%;
  padding: 0.7rem 0.9rem;
  font-family: inherit;
  font-size: 1rem;
  color: var(--ink);
  background: #fff;
  border: 1px solid var(--sand-300);
  border-radius: var(--radius-md);
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
}

.form-input:hover,
.form-select:hover,
.form-textarea:hover { border-color: var(--olive-500); }

.form-input:focus,
.form-select:focus,
.form-textarea:focus {
  outline: none;
  border-color: var(--olive-700);
  box-shadow: var(--shadow-focus);
}

.form-textarea {
  resize: vertical;
  min-height: 100px;
  line-height: 1.55;
}

.char-counter {
  font-size: 0.75rem;
  color: var(--ink-mute);
  text-align: right;
  margin-top: 0.25rem;
}

.char-counter.warning { color: var(--warning-text); }
.char-counter.error { color: var(--error); }

/* Field error state */
.form-group.has-error .form-input,
.form-group.has-error .form-select,
.form-group.has-error .form-textarea,
.form-group.has-error .checkbox-block,
.form-group.has-error .role-card-group,
.form-group.has-error .grid-availability {
  border-color: var(--error);
  background: var(--error-bg);
}

.error-message {
  display: none;
  font-size: 0.825rem;
  color: var(--error);
  margin-top: 0.4rem;
  font-weight: 500;
}

.form-group.has-error .error-message { display: block; }

/* Field Grid */
.field-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 1.25rem;
}

.field-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.field-grid.plz-ort { grid-template-columns: 120px 1fr; }

@media (max-width: 540px) {
  .field-grid.cols-2 { grid-template-columns: 1fr; }
  .field-grid.plz-ort { grid-template-columns: 1fr; }
}

/* Checkbox / Radio Blocks */
.checkbox-block {
  display: flex;
  align-items: flex-start;
  gap: 0.75rem;
  padding: 0.85rem 1rem;
  background: var(--olive-50);
  border: 1px solid var(--sand-200);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: background 0.15s ease, border-color 0.15s ease;
}

.checkbox-block:hover {
  background: var(--olive-100);
  border-color: var(--olive-300);
}

.checkbox-block input[type="checkbox"],
.checkbox-block input[type="radio"] {
  margin: 0.2rem 0 0 0;
  flex-shrink: 0;
  width: 18px;
  height: 18px;
  accent-color: var(--olive-700);
  cursor: pointer;
}

.checkbox-label {
  flex: 1;
  font-size: 0.95rem;
  line-height: 1.5;
}

.checkbox-label strong {
  font-weight: 500;
  display: block;
  margin-bottom: 0.15rem;
}

.checkbox-label small {
  font-size: 0.8rem;
  color: var(--ink-mute);
  display: block;
}

.checkbox-stack {
  display: flex;
  flex-direction: column;
  gap: 0.55rem;
}

.checkbox-stack.cols-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.65rem;
}

@media (max-width: 540px) {
  .checkbox-stack.cols-2 { grid-template-columns: 1fr; }
}

/* Combobox (Verein-Suche) */
.combobox {
  position: relative;
}

.combobox-list {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  right: 0;
  max-height: 240px;
  overflow-y: auto;
  background: #fff;
  border: 1px solid var(--olive-300);
  border-radius: var(--radius-md);
  box-shadow: 0 8px 24px rgba(44, 51, 32, 0.12);
  z-index: 10;
  display: none;
}

.combobox-list.open { display: block; }

.combobox-item {
  padding: 0.7rem 1rem;
  cursor: pointer;
  border-bottom: 1px solid var(--sand-100);
  font-size: 0.95rem;
}

.combobox-item:last-child { border-bottom: none; }

.combobox-item:hover,
.combobox-item.highlighted {
  background: var(--olive-50);
}

.combobox-item-name {
  font-weight: 500;
  color: var(--ink);
}

.combobox-item-meta {
  font-size: 0.825rem;
  color: var(--ink-mute);
  margin-top: 2px;
}

.combobox-no-results {
  padding: 1rem;
  text-align: center;
  color: var(--ink-mute);
  font-size: 0.9rem;
  font-style: italic;
}

.combobox-selected {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--olive-100);
  border: 1px solid var(--olive-300);
  border-radius: var(--radius-md);
  padding: 0.7rem 1rem;
  margin-top: 0.4rem;
}

.combobox-selected-text {
  font-size: 0.95rem;
  color: var(--olive-900);
  font-weight: 500;
}

.combobox-clear {
  background: none;
  border: none;
  color: var(--olive-700);
  cursor: pointer;
  font-size: 0.85rem;
  padding: 4px 8px;
  border-radius: var(--radius-sm);
  font-family: inherit;
}

.combobox-clear:hover {
  background: var(--olive-300);
  color: var(--cream);
}

/* Blocker (Hard-Filter Stop) */
.blocker {
  display: none;
  background: var(--error-bg);
  border: 1px solid var(--error);
  border-radius: var(--radius-md);
  padding: 1.25rem 1.5rem;
  margin-top: 1.5rem;
}

.blocker.active { display: block; }

.blocker-title {
  font-family: 'DM Serif Display', serif;
  font-size: 1.15rem;
  color: var(--error);
  margin: 0 0 0.5rem;
}

.blocker-text {
  margin: 0;
  font-size: 0.92rem;
  color: var(--ink);
  line-height: 1.6;
}

/* Role Cards */
.role-card-group {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.7rem;
}

@media (max-width: 540px) {
  .role-card-group { grid-template-columns: 1fr; }
}

.role-card {
  position: relative;
  padding: 1rem 1.1rem;
  background: var(--cream);
  border: 1.5px solid var(--sand-300);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all 0.15s ease;
}

.role-card:hover {
  border-color: var(--olive-500);
  background: var(--sand-50);
}

.role-card.selected {
  border-color: var(--olive-700);
  background: var(--olive-100);
  box-shadow: 0 0 0 3px rgba(107, 122, 74, 0.15);
}

.role-card input {
  position: absolute;
  opacity: 0;
  pointer-events: none;
}

.role-card-title {
  font-weight: 500;
  font-size: 0.95rem;
  margin-bottom: 0.2rem;
  color: var(--ink);
}

.role-card-desc {
  font-size: 0.82rem;
  color: var(--ink-mute);
  line-height: 1.45;
}

.role-card.selected .role-card-title {
  color: var(--olive-900);
}

/* Conditional Sub-section (Sicherheit, Prävention) */
.conditional-block {
  display: none;
  margin-top: 1.5rem;
  padding: 1.25rem 1.5rem;
  background: var(--olive-50);
  border-left: 3px solid var(--olive-500);
  border-radius: 0 var(--radius-md) var(--radius-md) 0;
}

.conditional-block.active { display: block; }

.conditional-block .form-label:first-child { margin-top: 0; }

/* Availability Grid (7 Tage × 4 Slots) */
.grid-availability {
  display: grid;
  grid-template-columns: 60px repeat(4, 1fr);
  gap: 4px;
  background: var(--sand-100);
  padding: 6px;
  border-radius: var(--radius-md);
  border: 1px solid var(--sand-200);
}

.grid-cell-header {
  font-size: 0.75rem;
  font-weight: 500;
  text-align: center;
  padding: 8px 4px;
  color: var(--olive-700);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.grid-cell-day {
  font-weight: 500;
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--cream);
  border-radius: var(--radius-sm);
  padding: 8px 4px;
  color: var(--olive-900);
}

.grid-slot {
  background: var(--cream);
  border-radius: var(--radius-sm);
  padding: 12px 4px;
  cursor: pointer;
  text-align: center;
  font-size: 0.8rem;
  color: var(--ink-mute);
  transition: all 0.15s ease;
  user-select: none;
  border: 1.5px solid transparent;
}

.grid-slot:hover {
  background: var(--olive-50);
  border-color: var(--olive-300);
}

.grid-slot.selected {
  background: var(--olive-500);
  color: var(--cream);
  border-color: var(--olive-700);
  font-weight: 500;
}

.grid-slot.selected:hover {
  background: var(--olive-700);
}

@media (max-width: 540px) {
  .grid-availability {
    grid-template-columns: 50px repeat(4, 1fr);
    font-size: 0.75rem;
  }
  .grid-cell-day { font-size: 0.75rem; }
  .grid-slot { padding: 10px 2px; font-size: 0.7rem; }
}

/* Adress-Verifikation Status */
.adresse-status {
  margin-top: 0.5rem;
  font-size: 0.825rem;
  padding: 0.4rem 0.75rem;
  border-radius: var(--radius-md);
  display: none;
}

.adresse-status.aktiv { display: block; }

.adresse-status.pruefe {
  background: var(--sand-100);
  color: var(--ink-mute);
}

.adresse-status.ok {
  background: var(--success-bg);
  color: var(--success);
  font-weight: 500;
}

.adresse-status.warning {
  background: var(--warning-bg);
  color: var(--warning-text);
}

.adresse-status.error {
  background: var(--error-bg);
  color: var(--error);
}

/* Datei-Upload */
.upload-dropzone {
  border: 2px dashed var(--sand-300);
  border-radius: var(--radius-md);
  padding: 2rem 1.5rem;
  text-align: center;
  background: var(--cream);
  transition: all 0.15s ease;
  cursor: pointer;
}

.upload-dropzone:hover {
  border-color: var(--olive-500);
  background: var(--olive-50);
}

.upload-dropzone.dragover {
  border-color: var(--olive-700);
  background: var(--olive-100);
}

.upload-dropzone-icon {
  font-size: 2rem;
  color: var(--olive-500);
  margin-bottom: 0.5rem;
}

.upload-dropzone-text {
  font-size: 0.95rem;
  color: var(--ink);
  margin: 0;
}

.upload-button {
  display: inline-block;
  padding: 0.5rem 1rem;
  background: var(--olive-700);
  color: var(--cream);
  border-radius: var(--radius-md);
  cursor: pointer;
  font-size: 0.9rem;
  font-weight: 500;
  margin-top: 0.5rem;
  transition: background 0.15s ease;
}

.upload-button:hover { background: var(--olive-900); }
.upload-input { display: none; }
.upload-list { margin-top: 1rem; }

.upload-item {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.65rem 0.85rem;
  background: var(--olive-50);
  border: 1px solid var(--sand-200);
  border-radius: var(--radius-md);
  margin-bottom: 0.4rem;
  font-size: 0.9rem;
}

.upload-item-icon { flex-shrink: 0; font-size: 1.2rem; }
.upload-item-info { flex: 1; min-width: 0; }

.upload-item-name {
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.upload-item-meta { font-size: 0.8rem; color: var(--ink-mute); }
.upload-item-kategorie { flex-shrink: 0; }

.upload-item-kategorie select {
  font-family: inherit;
  font-size: 0.825rem;
  padding: 0.25rem 0.5rem;
  border: 1px solid var(--sand-300);
  border-radius: var(--radius-sm);
  background: var(--cream);
  cursor: pointer;
}

.upload-item-remove {
  background: none;
  border: none;
  color: var(--error);
  cursor: pointer;
  padding: 4px 8px;
  font-size: 1.2rem;
  font-weight: bold;
  font-family: inherit;
  border-radius: var(--radius-sm);
}

.upload-item-remove:hover { background: var(--error-bg); }

.upload-error {
  color: var(--error);
  font-size: 0.85rem;
  margin-top: 0.5rem;
  font-style: italic;
}

/* Range / Slider */
.btn-quick-stunden {
  font-family: inherit;
  font-size: 0.825rem;
  padding: 0.4rem 0.85rem;
  border: 1px solid var(--sand-300);
  background: var(--cream);
  color: var(--olive-700);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all 0.15s ease;
}

.btn-quick-stunden:hover {
  background: var(--olive-50);
  border-color: var(--olive-500);
}

.btn-quick-stunden.active {
  background: var(--olive-100);
  border-color: var(--olive-700);
  color: var(--olive-900);
  font-weight: 500;
}

.soft-skill-row {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 1rem;
  padding: 0.7rem 0;
  border-bottom: 1px solid var(--sand-100);
}

.soft-skill-row:last-child { border-bottom: none; }

.soft-skill-label {
  font-size: 0.92rem;
  color: var(--ink);
}

.soft-skill-rating {
  display: flex;
  gap: 4px;
}

.rating-btn {
  width: 32px;
  height: 32px;
  border: 1.5px solid var(--sand-300);
  background: var(--cream);
  border-radius: 50%;
  cursor: pointer;
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--ink-mute);
  transition: all 0.15s ease;
  font-family: inherit;
}

.rating-btn:hover {
  border-color: var(--olive-500);
}

.rating-btn.active {
  background: var(--olive-500);
  color: var(--cream);
  border-color: var(--olive-700);
}

/* Sprachen Liste */
.sprachen-row {
  display: grid;
  grid-template-columns: 1fr 200px;
  gap: 0.7rem;
  align-items: center;
  padding: 0.6rem 0;
  border-bottom: 1px solid var(--sand-100);
}

.sprachen-row:last-child { border-bottom: none; }

.sprachen-label {
  font-size: 0.92rem;
  color: var(--ink);
}

@media (max-width: 540px) {
  .sprachen-row { grid-template-columns: 1fr; gap: 0.4rem; }
  .sprachen-row .form-select { width: 100%; }
}

/* Privacy Notice (Sektion 9) */
.privacy-block {
  background: var(--sand-100);
  border-radius: var(--radius-md);
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  border: 1px solid var(--sand-200);
}

.privacy-block h4 {

// Rollen-Anstellungsformen-Mapping nach §17 KCanG
// Unmittelbare Tätigkeiten am Pflanzen-/Produkt (Anbau, Ernte, Abgabe) = nur Minijob
// Vorstand = Minijob oder Ehrenamt
// Head Grower = Leitungsfunktion (nicht selbst an Pflanzen) → TZ/VZ möglich
// Sonstige (Reinigung, Sicherheit) = alle Anstellungsformen
const ROLE_ANSTELLUNG_MAP = {
  'grower':            ['minijob'],
  'head_grower':       ['teilzeit', 'vollzeit', 'honorar'],
  'ausgabe':           ['minijob'],
  'vorstand':          ['minijob', 'ehrenamt'],
  'stellv_vorstand':   ['minijob', 'ehrenamt'],
  'praevention':       ['minijob', 'ehrenamt', 'honorar'],
  'springer':          ['minijob'],
  'reinigung':         ['minijob', 'teilzeit', 'vollzeit', 'honorar'],
  'sicherheit':        ['minijob', 'teilzeit', 'vollzeit', 'honorar']
};

// Rollen-Standort-Mapping
// 'anbau'    = Anbauanlage (eigene Räumlichkeit, oft entfernt)
// 'ausgabe'  = Ausgabestelle (vor Ort, Mitgliederkontakt)
// 'flexibel' = standort-übergreifend (Büro, je nach Bedarf)
const ROLE_STANDORT_MAP = {
  'grower':            'anbau',
  'head_grower':       'anbau',
  'ausgabe':           'ausgabe',
  'sicherheit':        'ausgabe',
  'praevention':       'ausgabe',
  'springer':          'ausgabe',
  'vorstand':          'flexibel',
  'stellv_vorstand':   'flexibel',
  'reinigung':         'flexibel'
};

// Hilfsfunktion: Schnittmenge der erlaubten Anstellungsformen für gewählte Rollen
function allowedAnstellungen(rollen) {
  if (!rollen || rollen.length === 0) return [];
  let allowed = null;
  rollen.forEach(r => {
    const set = new Set(ROLE_ANSTELLUNG_MAP[r] || []);
    allowed = allowed === null ? set : new Set([...allowed].filter(x => set.has(x)));
  });
  return allowed ? Array.from(allowed) : [];
}

// Hilfsfunktion: Welche Standorte ergeben sich aus den gewählten Rollen?
// Liefert sortiertes Array mit unique Werten ['anbau', 'ausgabe'] oder ['flexibel']
function rolleStandorte(rollen) {
  if (!rollen || rollen.length === 0) return [];
  const standorte = new Set();
  rollen.forEach(r => {
    const s = ROLE_STANDORT_MAP[r];
    if (s) standorte.add(s);
  });
  // Wenn Anbau oder Ausgabe dabei ist, brauchen wir keine 'flexibel'-Anzeige
  // (flexibel-Rollen werden in den vorhandenen Rastern mit erfasst)
  if (standorte.has('anbau') || standorte.has('ausgabe')) {
    standorte.delete('flexibel');
  }
  return Array.from(standorte).sort();  // ['anbau', 'ausgabe']
}

// Hilfsfunktion: Standort-Konflikt vorhanden? (Anbau UND Ausgabe gleichzeitig)
function hasStandortKonflikt(rollen) {
  const s = rolleStandorte(rollen);
  return s.includes('anbau') && s.includes('ausgabe');
}

// ============================================================================
// I18N
// ============================================================================
async function loadLang(lang) {
  // Versuche mehrere Pfade, damit es egal ist wie die Dateien abgelegt sind
  const paths = [
    `./i18n/${lang}.json`,    // Unterordner i18n/
    `./${lang}.json`,          // selber Ordner wie HTML
    `i18n/${lang}.json`,       // ohne ./
    `${lang}.json`             // ohne ./ und ohne Unterordner
  ];
  
  let lastError = null;
  for (const path of paths) {
    try {
      const res = await fetch(path);
      if (!res.ok) {
        lastError = `HTTP ${res.status} bei ${path}`;
        continue;
      }
      state.i18n = await res.json();
      state.lang = lang;
      document.documentElement.lang = state.i18n.meta.lang;
      document.documentElement.dir = state.i18n.meta.dir || 'ltr';
      document.title = state.i18n.meta.title;
      console.log('Sprache geladen von:', path);
      return true;
    } catch (e) {
      lastError = e.message + ' bei ' + path;
    }
  }
  console.error('Sprach-Datei nicht gefunden. Versuchte Pfade:', paths, 'Letzter Fehler:', lastError);
  return false;
}

function t(key, params = {}) {
  const keys = key.split('.');
  let val = state.i18n;
  for (const k of keys) {
    if (val == null) return key;
    val = val[k];
  }
  if (typeof val !== 'string') return key;
  return val.replace(/\{(\w+)\}/g, (m, p) => params[p] != null ? params[p] : m);
}

function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);

  document.getElementById('brand-subtitle').textContent = t('header.subtitle');
  document.getElementById('intro-text').textContent = t('header.intro');
  document.getElementById('lang-label').textContent = t('header.language_label');

}

    o.value = l.code;
    o.textContent = l.label;
    if (l.code === state.lang) o.selected = true;
    sel.appendChild(o);

    if (await loadLang(e.target.value)) {

  try {
    sessionStorage.setItem(STORAGE_KEY, JSON.stringify({
      lang: state.lang,
      currentSection: state.currentSection,
      formData: state.formData
    }));
  } catch (e) {}
}

function loadDraft() {
  try {
    const raw = sessionStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const d = JSON.parse(raw);
    if (d.lang) state.lang = d.lang;
    if (d.currentSection) state.currentSection = d.currentSection;
    if (d.formData) Object.assign(state.formData, d.formData);
    return true;
  } catch (e) { return false; }
}

function clearDraft() {
  try { sessionStorage.removeItem(STORAGE_KEY); } catch (e) {}
}

}

function renderSection5() {
  const s = state.i18n.sections['5'];
  const tage = [
    ['mo', s.tag_mo], ['di', s.tag_di], ['mi', s.tag_mi], ['do', s.tag_do],
    ['fr', s.tag_fr], ['sa', s.tag_sa], ['so', s.tag_so]
  ];
  const slots = [s.slot_morgens, s.slot_mittags, s.slot_nachmittags, s.slot_abends];

  // Welche Standorte brauchen wir?
  const standorte = rolleStandorte(state.formData.rollen);
  
  // Falls noch keine Rollen gewählt: zeige nur das allgemeine Raster
  // (Bewerber kann durch alle Sektionen ohne Rollenwahl, sollte aber Sektion 3 zuerst machen)
  const zeigeStandorte = standorte.length > 0 ? standorte : ['allgemein'];
  // Spezialfall: wenn nur flexible Rollen (Vorstand, Reinigung) → 'allgemein' Raster
  if (standorte.length === 0 && state.formData.rollen.length > 0) {
    zeigeStandorte.length = 0;
    zeigeStandorte.push('allgemein');
  }

  // Helper: Raster für einen Standort generieren
  function rasterHTML(standort) {
    const titel = s[`matrix_titel_${standort}`] || s.matrix_titel;
    const hint = s[`matrix_hint_${standort}`] || s.matrix_hint;
    return `
      <h3 class="section-subtitle">${titel}</h3>
      <p class="form-hint" style="margin-bottom: 1rem;">${hint}</p>
      <div class="form-group" id="fg-verfuegbarkeit-${standort}">
        <div class="grid-availability">
          <div class="grid-cell-header"></div>
          ${slots.map(sl => `<div class="grid-cell-header">${sl}</div>`).join('')}
          ${tage.map(([d, label]) => `
            <div class="grid-cell-day">${label}</div>
            ${[0,1,2,3].map(i => `
              <div class="grid-slot" data-standort="${standort}" data-day="${d}" data-slot="${i}">·</div>
            `).join('')}
          `).join('')}
        </div>
        <div class="error-message">${t(`validation.min_one_slot_${standort}`) || t('validation.min_one_slot')}</div>
      </div>
    `;
  }

  return `

function renderSection6() {
  const s = state.i18n.sections['6'];
  const allFormen = [
    { id: 'vollzeit', t: s.anstellung_vollzeit, d: s.anstellung_vollzeit_desc },
    { id: 'teilzeit', t: s.anstellung_teilzeit, d: s.anstellung_teilzeit_desc },
    { id: 'minijob', t: s.anstellung_minijob, d: s.anstellung_minijob_desc },
    { id: 'ehrenamt', t: s.anstellung_ehrenamt, d: s.anstellung_ehrenamt_desc },
    { id: 'honorar', t: s.anstellung_honorar, d: s.anstellung_honorar_desc }
  ];
  
  // Filter nach gewählten Rollen
  const allowed = allowedAnstellungen(state.formData.rollen);
  const verfuegbar = allowed.length > 0
    ? allFormen.filter(f => allowed.includes(f.id))
    : allFormen;  // Keine Rolle gewählt = alle anzeigen (Edge-Case)
  
  const blockedForms = allFormen.filter(f => !verfuegbar.find(v => v.id === f.id));
  
  // SPECIAL CASE: Leere Schnittmenge — Rollen sind nicht in einem Vertrag kombinierbar
  const empty_intersection = state.formData.rollen.length > 0 && allowed.length === 0;
  
  return `
    <h2 class="section-title">${s.title}</h2>
    <p class="section-description">${s.description}</p>

    ${empty_intersection ? `

      <p>${s.keine_kombination_text || 'Deine gewählten Rollen haben unterschiedliche rechtliche Anforderungen — z. B. Grower (nur Minijob nach §17 KCanG) und Head Grower (Teilzeit/Vollzeit). Diese können nicht in einem einzigen Anstellungsvertrag kombiniert werden. Wenn du beide Rollen ausüben möchtest, bräuchtest du zwei separate Verträge. Das ist möglich, aber ungewöhnlich.'}</p>
      <p><strong>${s.keine_kombination_hinweis || 'Was kannst du tun?'}</strong></p>
      <ul style="margin: 0.5rem 0 0; padding-left: 1.25rem;">
        <li>${s.keine_kombination_option1 || 'Geh zurück zu Sektion 3 und wähle nur eine der beiden Rollen'}</li>
        <li>${s.keine_kombination_option2 || 'Wähle hier alle gewünschten Anstellungsformen — der Vorstand prüft im Einzelfall'}</li>
      </ul>
    </div>
    ` : (state.formData.rollen.length > 0 ? `
    <div class="info-box" style="background: var(--olive-50); border-left-color: var(--olive-500);">
      <p class="info-box-title" style="color: var(--olive-700);">${s.kcang_titel || 'Hinweis nach §17 KCanG'}</p>
      <p>${s.kcang_text || 'Aufgrund deiner gewählten Rolle(n) sind nur bestimmte Anstellungsformen rechtlich zulässig. Das Konsumcannabisgesetz beschränkt unmittelbare Tätigkeiten (Anbau, Ausgabe) auf Minijob-Niveau.'}</p>
    </div>
    ` : '')}

    <div class="form-group" id="fg-anstellung">
      <label class="form-label">${s.anstellung_label}<span class="required">*</span></label>
      <div class="role-card-group">
        ${(empty_intersection ? allFormen : verfuegbar).map(f => `
          <label class="role-card" data-anstellung="${f.id}">
            <input type="checkbox" value="${f.id}" data-anstellung-cb>
            <div class="role-card-title">${f.t}</div>

          </label>
        `).join('')}
      </div>
      <div class="error-message">${t('validation.min_one_anstellung')}</div>
    </div>

    ${blockedForms.length > 0 && !empty_intersection ? `
    <div style="margin-top: 1.5rem; padding: 1rem 1.25rem; background: var(--sand-100); border-radius: var(--radius-md); border: 1px dashed var(--sand-300);">

function attachSection1() {
  // Verein-Combobox
  const search = document.getElementById('verein-search');
  const list = document.getElementById('verein-list');
  const selected = document.getElementById('verein-selected');
  const selectedText = document.getElementById('verein-selected-text');
  const clearBtn = document.getElementById('verein-clear');

  function renderList(filter = '') {
    const f = filter.toLowerCase().trim();
    const filtered = f
      ? state.vereine.filter(v => 
          v.name.toLowerCase().includes(f) || 
          (v.ort && v.ort.toLowerCase().includes(f)) || 
          (v.plz && v.plz.includes(f))
        )
      : state.vereine;

    if (filtered.length === 0) {
      list.innerHTML = `<div class="combobox-no-results">${t('sections.1.verein_no_results')}</div>`;
    } else {
      list.innerHTML = filtered.map(v => `
        <div class="combobox-item" data-id="${v.id}">
          <div class="combobox-item-name">${v.name}</div>
          <div class="combobox-item-meta">${v.plz || ''} ${v.ort || ''}</div>
        </div>
      `).join('');
      list.querySelectorAll('.combobox-item').forEach(it => {
        it.addEventListener('click', () => selectVerein(it.dataset.id));
      });
    }
    list.classList.add('open');
  }

  function selectVerein(id) {
    const v = state.vereine.find(v => v.id === id);
    if (!v) return;
    state.formData.verein_id = id;
    selectedText.textContent = `${v.name} — ${v.plz || ''} ${v.ort || ''}`;
    selected.style.display = 'flex';
    search.style.display = 'none';
    list.classList.remove('open');
    document.getElementById('fg-verein').classList.remove('has-error');
    saveDraft();
  }

  search.addEventListener('focus', () => renderList(search.value));
  search.addEventListener('input', () => renderList(search.value));
  search.addEventListener('blur', () => setTimeout(() => list.classList.remove('open'), 200));

  clearBtn.addEventListener('click', () => {
    state.formData.verein_id = null;
    selected.style.display = 'none';
    search.style.display = '';
    search.value = '';
    saveDraft();
  });

  // Volljährigkeit
  document.getElementById('cb-volljaehrig').addEventListener('change', e => {
    state.formData.ist_volljaehrig = e.target.checked;
    document.getElementById('blocker-age').classList.toggle('active', !e.target.checked && e.target.dataset.touched === '1');
    e.target.dataset.touched = '1';
    document.getElementById('blocker-age').classList.toggle('active', !e.target.checked);
    saveDraft();
  });

  document.getElementById('cb-wohnsitz').addEventListener('change', e => {
    state.formData.wohnsitz_d_6_monate = e.target.checked;
    document.getElementById('blocker-wohnsitz').classList.toggle('active', !e.target.checked);
    saveDraft();
  });

  document.querySelectorAll('input[name="mitglied"]').forEach(r => {

// Adress-Verifikation via OpenStreetMap Nominatim
// Wichtig: Nominatim erfordert User-Agent, max 1 Anfrage/Sekunde
async function verifyAdresse() {
  const d = state.formData;
  const statusEl = document.getElementById('adresse-status');
  if (!statusEl) return;
  
  if (!d.adresse_strasse?.trim() || !d.adresse_plz?.trim() || !d.adresse_ort?.trim()) {
    statusEl.classList.remove('aktiv');
    return;
  }
  
  // Status: Prüfung läuft
  statusEl.className = 'adresse-status aktiv pruefe';
  statusEl.textContent = t('validation.adresse_pruefe');
  
  try {
    // Nominatim-Query mit strukturierten Parametern
    const params = new URLSearchParams({
      street: d.adresse_strasse.trim(),
      postalcode: d.adresse_plz.trim(),
      city: d.adresse_ort.trim(),
      country: 'Deutschland',
      format: 'jsonv2',
      limit: '3',
      addressdetails: '1'
    });
    
    const res = await fetch(`https://nominatim.openstreetmap.org/search?${params.toString()}`, {
      headers: {
        // Nominatim ToS: User-Agent erforderlich für Identifikation
        'Accept': 'application/json'
      }
    });
    
    if (!res.ok) throw new Error('Nominatim error: ' + res.status);
    const results = await res.json();
    
    if (results.length === 0) {
      // Nicht gefunden — nicht blockieren, nur warnen
      statusEl.className = 'adresse-status aktiv error';
      statusEl.textContent = t('validation.adresse_nicht_gefunden');
      d.adresse_verifiziert = 'not_found';
      d.adresse_lat = null;
      d.adresse_lon = null;
    } else if (results.length === 1) {
      // Eindeutiger Treffer
      const r = results[0];
      statusEl.className = 'adresse-status aktiv ok';
      statusEl.textContent = t('validation.adresse_verifiziert') + ' — ' + (r.display_name || '').split(',').slice(0, 3).join(', ');
      d.adresse_verifiziert = 'ok';
      d.adresse_lat = parseFloat(r.lat);
      d.adresse_lon = parseFloat(r.lon);
    } else {
      // Mehrdeutig
      statusEl.className = 'adresse-status aktiv warning';
      statusEl.textContent = t('validation.adresse_unklar');
      d.adresse_verifiziert = 'warning';
      // Trotzdem ersten Treffer als Koordinate speichern
      d.adresse_lat = parseFloat(results[0].lat);
      d.adresse_lon = parseFloat(results[0].lon);
    }
    saveDraft();
  } catch (e) {
    console.error('Adress-Verifikation fehlgeschlagen:', e);
    // Fail silently — Bewerber soll trotzdem absenden können
    statusEl.classList.remove('aktiv');
  }
}

// Datei-Upload-Helpers
function handleUploadedFiles(files) {
  const allowedTypes = ['application/pdf', 'image/jpeg', 'image/jpg', 'image/png', 'image/heic'];
  const maxSize = 10 * 1024 * 1024;  // 10 MB
  const maxFiles = 10;
  const errEl = document.getElementById('upload-error');
  let error = '';
  
  for (const file of files) {
    if (state.formData.anhaenge.length >= maxFiles) {
      error = t('validation.anhaenge_max_files') || t('sections.4.anhaenge_max_files') || 'Maximum 10 files allowed';
      break;
    }
    if (file.size > maxSize) {
      error = (t('sections.4.anhaenge_size_too_large') || 'File too large') + ': ' + file.name;
      continue;
    }
    if (!allowedTypes.includes(file.type) && !/\.(pdf|jpe?g|png|heic)$/i.test(file.name)) {
      error = (t('sections.4.anhaenge_format_not_allowed') || 'Format not allowed') + ': ' + file.name;
      continue;
    }
    
    // Datei als File-Objekt im Memory halten (Upload erst beim Submit)
    state.formData.anhaenge.push({
      file: file,
      filename: file.name,
      size: file.size,
      mime: file.type || 'application/octet-stream',
      kategorie: detectCategoryByName(file.name),
      uploaded: false,
      storage_path: null
    });
  }
  
  if (error) {
    errEl.textContent = error;
    errEl.style.display = 'block';
    setTimeout(() => { errEl.style.display = 'none'; }, 5000);
  }
  
  renderUploadList();
  updateKeineUnterlagenVisibility();
  saveDraft();
}

function detectCategoryByName(filename) {
  const lower = filename.toLowerCase();
  if (/\b(cv|lebenslauf|resume)\b/.test(lower)) return 'lebenslauf';
  if (/\b(zeugnis|certificate|abschluss|abitur)\b/.test(lower)) return 'zeugnis';
  if (/\b(sachkunde|34a|prävent|praevent)\b/.test(lower)) return 'sachkunde';
  return 'sonstiges';
}

function getFileIcon(mime) {
  if (mime?.startsWith('image/')) return '🖼️';
  if (mime?.includes('pdf')) return '📄';
  return '📎';
}

function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return Math.round(bytes / 1024) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

        document.querySelectorAll('[data-probearbeit-ort]').forEach(c => {

        });

        if (anm) anm.value = '';

  document.querySelectorAll('[data-probearbeit-ort]').forEach(card => {

      if (e.target !== cb) {

        cb.checked = !cb.checked;

// Jobticket nur zeigen wenn kein Führerschein ODER kein eigenes Fahrzeug
function updateJobticketVisibility() {
  const block = document.getElementById('cb-jobticket');
  if (!block) return;
  const noFs = state.formData.fuehrerschein.includes('kein') || state.formData.fuehrerschein.length === 0;
  const noFahrzeug = state.formData.eigenes_fahrzeug === false;
  if (noFs || noFahrzeug) {
    block.style.display = '';
    block.classList.add('active');
  } else {
    block.style.display = 'none';
    block.classList.remove('active');
    // Reset wenn versteckt
    state.formData.jobticket = null;
    document.querySelectorAll('input[name="jobticket"]').forEach(r => r.checked = false);
  }
}

// ============================================================================
// FORM-WIEDERHERSTELLUNG AUS STATE
// ============================================================================
function fillFormFromState() {
  const d = state.formData;

  // Sektion 1
  if (d.verein_id) {
    const v = state.vereine.find(x => x.id === d.verein_id);
    if (v) {
      document.getElementById('verein-selected-text').textContent = `${v.name} — ${v.plz || ''} ${v.ort || ''}`;
      document.getElementById('verein-selected').style.display = 'flex';
      document.getElementById('verein-search').style.display = 'none';
    }
  }
  if (d.ist_volljaehrig) document.getElementById('cb-volljaehrig').checked = true;
  if (d.wohnsitz_d_6_monate) document.getElementById('cb-wohnsitz').checked = true;
  if (d.ist_mitglied) {
    const r = document.querySelector(`input[name="mitglied"][value="${d.ist_mitglied}"]`);
    if (r) r.checked = true;
    document.getElementById('blocker-mitglied').classList.toggle('active', d.ist_mitglied === 'nein');
  }
  if (d.ist_nicht_eu) {
    document.getElementById('cb-nicht-eu').checked = true;
    document.getElementById('fg-arbeitserlaubnis').style.display = '';
    if (d.arbeitserlaubnis) document.getElementById('cb-arbeitserlaubnis').checked = true;
  }

  // Sektion 2 — Inputs
  const setVal = (id, val) => { const e = document.getElementById(id); if (e && val) e.value = val; };
  setVal('i-vorname', d.vorname);
  setVal('i-nachname', d.nachname);
  setVal('i-geburtsdatum', d.geburtsdatum);
  setVal('i-geburtsort', d.geburtsort);
  setVal('i-staatsangehoerigkeit', d.staatsangehoerigkeit);
  setVal('i-strasse', d.adresse_strasse);
  setVal('i-plz', d.adresse_plz);
  setVal('i-ort', d.adresse_ort);
  setVal('i-telefon', d.telefon);
  setVal('i-email', d.email);
  setVal('i-steuer-id', d.steuer_id);
  setVal('i-sv-nummer', d.sv_nummer);
  setVal('i-iban', d.iban);
  setVal('i-kk-name', d.kk_name);
  setVal('i-kk-mitgl', d.kk_mitgl);
  
  // Adress-Status restoren
  if (d.adresse_verifiziert) {
    const statusEl = document.getElementById('adresse-status');
    if (statusEl) {
      if (d.adresse_verifiziert === 'ok') {
        statusEl.className = 'adresse-status aktiv ok';
        statusEl.textContent = t('validation.adresse_verifiziert');
      } else if (d.adresse_verifiziert === 'warning') {
        statusEl.className = 'adresse-status aktiv warning';
        statusEl.textContent = t('validation.adresse_unklar');
      } else if (d.adresse_verifiziert === 'not_found') {
        statusEl.className = 'adresse-status aktiv error';
        statusEl.textContent = t('validation.adresse_nicht_gefunden');
      }
    }
  }

  // Sektion 3
  d.rollen.forEach(r => {
    const card = document.querySelector(`[data-role="${r}"]`);
    if (card) {
      card.classList.add('selected');
      const cb = card.querySelector('input');
      if (cb) cb.checked = true;
    }
  });
  updateConditionalBlocks();
  
  // Konflikt-Block ein-/ausblenden je nach Rollen
  if (hasStandortKonflikt(d.rollen)) {
    const blk = document.getElementById('standort-konflikt-block');
    if (blk) blk.style.display = '';
    if (d.bestaetigt_zwei_standorte) {
      const cb = document.getElementById('cb-standort-konflikt');
      if (cb) cb.checked = true;
    }
  }
  if (d.praevention_sachkunde) {
    const r = document.querySelector(`input[name="praevention"][value="${d.praevention_sachkunde}"]`);
    if (r) r.checked = true;
  }
  if (d.sicherheit_nachweis) {
    const r = document.querySelector(`input[name="sicherheit"][value="${d.sicherheit_nachweis}"]`);
    if (r) r.checked = true;
  }
  if (d.motivation) {
    setVal('i-motivation', d.motivation);
    document.getElementById('counter-motivation').textContent = `${d.motivation.length} / 500`;
  }

  // Sektion 4
  setVal('i-bildung', d.bildungsabschluss);
  setVal('i-letzte', d.letzte_taetigkeit);
  setVal('i-vorerfahrung', d.vorerfahrung);
  Object.entries(d.sprachen).forEach(([sp, niveau]) => {
    const sel = document.querySelector(`[data-sprache="${sp}"]`);
    if (sel && niveau) sel.value = niveau;
  });
  Object.entries(d.soft_skills).forEach(([k, v]) => {
    if (v > 0) {
      const grp = document.querySelector(`[data-soft="${k}"]`);
      if (grp) {
        grp.querySelectorAll('.rating-btn').forEach(b => {
          b.classList.toggle('active', parseInt(b.dataset.rating) <= v);
        });
      }
    }
  });

  // Sektion 5 — Verfügbarkeit pro Standort restoren
  ['anbau', 'ausgabe', 'allgemein'].forEach(standort => {
    if (d.verfuegbarkeit[standort]) {
      Object.entries(d.verfuegbarkeit[standort]).forEach(([day, slots]) => {
        slots.forEach((selected, i) => {
          if (selected) {
            const slot = document.querySelector(`.grid-slot[data-standort="${standort}"][data-day="${day}"][data-slot="${i}"]`);
            if (slot) {
              slot.classList.add('selected');
              slot.textContent = '✓';
            }
          }
        });
      });
    }
  });
  setVal('i-wunsch-zeiten', d.wunsch_zeiten);
  setVal('i-stunden-min', d.wunsch_stunden_min);
  setVal('i-stunden-max', d.wunsch_stunden_max);
  ['we', 'feiertag', 'nacht'].forEach(k => {
    if (d[`bereit_${k}`] !== null && d[`bereit_${k}`] !== undefined) {
      const r = document.querySelector(`input[name="bereit-${k}"][value="${d[`bereit_${k}`]}"]`);
      if (r) r.checked = true;
    }
  });
  setVal('i-eintritt', d.eintritt_fruehestens);
  setVal('i-kuendigungsfrist', d.kuendigungsfrist);
  setVal('i-sperrzeiten', d.sperrzeiten);

  // Probearbeit
  if (d.probearbeit_bereit !== null && d.probearbeit_bereit !== undefined) {
    const r = document.querySelector(`input[name="probearbeit-bereit"][value="${d.probearbeit_bereit}"]`);
    if (r) r.checked = true;
    if (d.probearbeit_bereit === true) {
      const details = document.getElementById('cb-probearbeit-details');
      if (details) details.classList.add('active');
    }
  }
  d.probearbeit_orte.forEach(ort => {
    const card = document.querySelector(`[data-probearbeit-ort="${ort}"]`);
    if (card) {
      card.classList.add('selected');
      const cb = card.querySelector('input');
      if (cb) cb.checked = true;
    }
  });
  if (d.probearbeit_dauer) {
    const rd = document.querySelector(`input[name="probearbeit-dauer"][value="${d.probearbeit_dauer}"]`);
    if (rd) rd.checked = true;
  }
  setVal('i-probearbeit-anmerkung', d.probearbeit_anmerkung);

  // Sektion 6
  d.anstellungsformen.forEach(a => {
    const card = document.querySelector(`[data-anstellung="${a}"]`);
    if (card) {
      card.classList.add('selected');
      const cb = card.querySelector('input');
      if (cb) cb.checked = true;
    }
  });

  // Sektion 7
  if (d.max_anfahrt) {
    const r = document.querySelector(`input[name="anfahrt"][value="${d.max_anfahrt}"]`);
    if (r) r.checked = true;
  }
  if (d.max_anfahrt_anbau) {
    const r = document.querySelector(`input[name="anfahrt-anbau"][value="${d.max_anfahrt_anbau}"]`);
    if (r) r.checked = true;
  }
  d.fuehrerschein.forEach(fs => {
    const cb = document.querySelector(`[data-fs="${fs}"]`);
    if (cb) cb.checked = true;
  });
  if (d.eigenes_fahrzeug !== null && d.eigenes_fahrzeug !== undefined) {
    const r = document.querySelector(`input[name="fahrzeug"][value="${d.eigenes_fahrzeug}"]`);
    if (r) r.checked = true;
  }
  if (d.jobticket) {
    const r = document.querySelector(`input[name="jobticket"][value="${d.jobticket}"]`);
    if (r) r.checked = true;
  }
  // Jobticket-Sichtbarkeit nach Restore aktualisieren
  if (typeof updateJobticketVisibility === 'function') {
    updateJobticketVisibility();
  }

  // Sektion 8
  if (d.sensible_einwilligung) {
    document.getElementById('cb-sensible-einwilligung').checked = true;
    const felder = document.getElementById('sensible-felder');
    felder.style.opacity = '1';
    felder.style.pointerEvents = '';
    if (d.sucht_relevant) {
      const r = document.querySelector(`input[name="sucht"][value="${d.sucht_relevant}"]`);
      if (r) r.checked = true;
    }
    setVal('i-sucht-details', d.sucht_details);
    if (d.schwerbehinderung) {
      const r = document.querySelector(`input[name="schwerbeh"][value="${d.schwerbehinderung}"]`);
      if (r) r.checked = true;
      if (d.schwerbehinderung === 'ja') {
        const det = document.getElementById('schwerbeh-details');
        if (det) det.style.display = '';
        const gdbEl = document.getElementById('i-schwerbeh-gdb');
        if (gdbEl && d.schwerbehinderung_gdb) gdbEl.value = d.schwerbehinderung_gdb;
        setVal('i-schwerbeh-einschr', d.schwerbehinderung_einschr);
        setVal('i-schwerbeh-anpassungen', d.schwerbehinderung_anpassungen);
      }
    }
  }

  // Sektion 9
  if (d.dsgvo_zustimmung) document.getElementById('cb-dsgvo').checked = true;
  if (d.wahrheitsgemaess) document.getElementById('cb-wahrheit').checked = true;
  if (d.captcha) document.getElementById('cb-captcha').checked = true;
}

// ============================================================================
// VALIDIERUNG
// ============================================================================
function validateSection(n) {
  state.errors = {};
  const d = state.formData;

  if (n === 1) {
    if (!d.verein_id) state.errors.verein = true;
    if (!d.ist_volljaehrig) state.errors.volljaehrig = true;
    if (!d.wohnsitz_d_6_monate) state.errors.wohnsitz = true;
    if (!d.ist_mitglied) state.errors.mitglied = true;
    else if (d.ist_mitglied === 'nein') state.errors.mitglied = true;
    if (d.ist_nicht_eu && !d.arbeitserlaubnis) state.errors.arbeitserlaubnis = true;
  }

  if (n === 2) {
    if (!d.vorname?.trim()) state.errors.vorname = true;
    if (!d.nachname?.trim()) state.errors.nachname = true;
    if (!d.geburtsdatum || !isValidDate(d.geburtsdatum)) {
      state.errors.geburtsdatum = true;
    } else {
      // Altersprüfung: min. 18, max. 100
      const age = calculateAge(d.geburtsdatum);
      if (age < 18) state.errors.geburtsdatum_age_under = true;
      else if (age > 100) state.errors.geburtsdatum_age_over = true;
    }
    if (!d.staatsangehoerigkeit?.trim()) state.errors.staatsangehoerigkeit = true;
    if (!d.adresse_strasse?.trim()) state.errors.strasse = true;
    if (!d.adresse_plz || !/^\d{5}$/.test(d.adresse_plz)) state.errors.plz = true;
    if (!d.adresse_ort?.trim()) state.errors.ort = true;
    if (!d.telefon || d.telefon.replace(/\D/g, '').length < 6) state.errors.telefon = true;
    if (!d.email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(d.email)) state.errors.email = true;
    
    // IBAN-Format-Check (nur wenn ausgefüllt, da freiwillig)
    if (d.iban && d.iban.trim()) {
      if (!isValidIBANFormat(d.iban)) state.errors.iban = true;
    }
  }

  if (n === 3) {
    if (d.rollen.length === 0) state.errors.rollen = true;
    if (d.rollen.includes('praevention') && !d.praevention_sachkunde) state.errors.praevention = true;
    if (d.rollen.includes('sicherheit') && !d.sicherheit_nachweis) state.errors.sicherheit = true;
    if (!d.motivation?.trim()) state.errors.motivation = true;
    if (hasStandortKonflikt(d.rollen) && !d.bestaetigt_zwei_standorte) {
      state.errors['standort-konflikt-bestaetigung'] = true;
    }
  }

  if (n === 4) {
    if (!d.bildungsabschluss) state.errors.bildung = true;
    if (!d.sprachen.de) state.errors.sprachen = true;
    // Wenn keine Anhänge → Bestätigung Pflicht
    if (d.anhaenge.length === 0 && !d.keine_unterlagen_bestaetigt) {
      state.errors['keine-unterlagen'] = true;
    }
  }

  if (n === 5) {
    // Standorte basierend auf Rollen ermitteln
    const standorte = rolleStandorte(d.rollen);
    const checkStandorte = standorte.length > 0 ? standorte : ['allgemein'];
    
    checkStandorte.forEach(standort => {
      const v = d.verfuegbarkeit[standort];
      if (!v) {
        state.errors[`verfuegbarkeit-${standort}`] = true;
        return;
      }
      const anyAvail = Object.values(v).some(arr => arr.some(slot => slot));
      if (!anyAvail) {
        state.errors[`verfuegbarkeit-${standort}`] = true;
      }
    });
    
    const min = parseInt(d.wunsch_stunden_min);
    const max = parseInt(d.wunsch_stunden_max);
    if (!d.wunsch_stunden_min || !d.wunsch_stunden_max || isNaN(min) || isNaN(max) || max < min) {
      state.errors.stunden = true;
    }
    if (d.bereit_we === null || d.bereit_we === undefined) state.errors['bereit-we'] = true;
    if (d.bereit_feiertag === null || d.bereit_feiertag === undefined) state.errors['bereit-feiertag'] = true;
    if (d.bereit_nacht === null || d.bereit_nacht === undefined) state.errors['bereit-nacht'] = true;
    if (!d.eintritt_fruehestens) state.errors.eintritt = true;
    if (d.probearbeit_bereit === null || d.probearbeit_bereit === undefined) state.errors['probearbeit-bereit'] = true;
    if (d.probearbeit_bereit === true && d.probearbeit_orte.length === 0) state.errors['probearbeit-orte'] = true;
  }

  if (n === 6) {
    if (d.anstellungsformen.length === 0) state.errors.anstellung = true;
  }

  if (n === 7) {
    const standorte = rolleStandorte(d.rollen);
    const hatAnbau = standorte.includes('anbau');
    const hatAusgabe = standorte.includes('ausgabe') || standorte.length === 0 || standorte.includes('flexibel') || (standorte.length === 1 && standorte[0] === 'allgemein');
    
    if (hatAusgabe && !d.max_anfahrt) state.errors.anfahrt = true;
    if (hatAnbau && !d.max_anfahrt_anbau) state.errors['anfahrt-anbau'] = true;
    if (d.fuehrerschein.length === 0) state.errors.fuehrerschein = true;
    if (d.eigenes_fahrzeug === null || d.eigenes_fahrzeug === undefined) state.errors.fahrzeug = true;
  }

  if (n === 8) {
    // Komplett freiwillig
  }

  if (n === 9) {
    if (!d.dsgvo_zustimmung) state.errors.dsgvo = true;
    if (!d.wahrheitsgemaess) state.errors.wahrheit = true;
    if (!d.captcha) state.errors.captcha = true;
  }

  return Object.keys(state.errors).length === 0;
}

function isValidDate(s) {
  return /^\d{4}-\d{2}-\d{2}$/.test(s) && !isNaN(new Date(s).getTime());
}

function calculateAge(dateStr) {
  const today = new Date();
  const birth = new Date(dateStr);
  let age = today.getFullYear() - birth.getFullYear();
  const monthDiff = today.getMonth() - birth.getMonth();
  if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) {
    age--;
  }
  return age;
}

// IBAN-Format-Check: Nur Format-Prüfung (DE 22 Zeichen, gültiger Ländercode)
// Echte MOD97-Prüfsumme erst beim Vertragsabschluss durch HR.
function isValidIBANFormat(iban) {
  if (!iban) return false;
  const cleaned = iban.replace(/[\s\-]/g, '').toUpperCase();
  
  // Muss mit 2 Buchstaben beginnen, dann 2 Ziffern, Rest alphanumerisch
  if (!/^[A-Z]{2}\d{2}[A-Z0-9]+$/.test(cleaned)) return false;
  
  // Längen-Map für gängige EU-Länder
  const lengthMap = { 
    DE: 22, AT: 20, CH: 21, FR: 27, IT: 27, ES: 24, NL: 18, BE: 16, 
    PL: 28, GB: 22, LU: 20, DK: 18, SE: 24, NO: 15, FI: 18, IE: 22,
    PT: 25, GR: 27, CZ: 24, HU: 28, SK: 24, SI: 19, EE: 20, LV: 21, LT: 20
  };
  const country = cleaned.substring(0, 2);
  const expected = lengthMap[country];
  if (expected && cleaned.length !== expected) return false;
  if (cleaned.length < 15 || cleaned.length > 34) return false;
  
  return true;
}

function showErrors() {
  // Alle previous errors wegnehmen
  document.querySelectorAll('.form-group').forEach(fg => fg.classList.remove('has-error'));

  // Aktuelle Fehler markieren
  Object.keys(state.errors).forEach(k => {
    // Mapping spezifischer Error-Keys auf die FG-IDs
    let fgKey = k;
    if (k === 'geburtsdatum_age_under' || k === 'geburtsdatum_age_over') {
      fgKey = 'geburtsdatum';
      // Spezielle Fehlermeldung in error-message ändern
      const fg = document.getElementById('fg-geburtsdatum');
      if (fg) {
        const em = fg.querySelector('.error-message');
        if (em) {
          em.textContent = k === 'geburtsdatum_age_under' 
            ? t('validation.age_under_18') 
            : t('validation.age_over_100');
        }
      }
    }
    const el = document.getElementById('fg-' + fgKey);
    if (el) el.classList.add('has-error');
  });

  const banner = document.getElementById('validation-banner');
  if (Object.keys(state.errors).length > 0) {
    banner.textContent = t('validation.fix_errors');
    banner.classList.add('active');
  } else {
    banner.classList.remove('active');
  }
}

// ============================================================================
// NAVIGATION
// ============================================================================
function showSection(n) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  const sec = document.getElementById(`section-${n}`);
  if (sec) sec.classList.add('active');
  state.currentSection = n;

  // Progress
  document.getElementById('prog-section').textContent = `${t('progress.section')} ${n}`;
  document.getElementById('prog-of').textContent = `${t('progress.of')} ${state.totalSections}`;
  const pct = Math.round((n / state.totalSections) * 100);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';

  // Buttons
  document.getElementById('btn-back').disabled = n === 1;
  const nextBtn = document.getElementById('btn-next');
  if (n === state.totalSections) {
    nextBtn.innerHTML = t('progress.submit');
  } else {
    nextBtn.innerHTML = `${t('progress.next')} →`;
  }

  // Banner zurücksetzen
  document.getElementById('validation-banner').classList.remove('active');

  // Scroll zum Anfang
  window.scrollTo({ top: 0, behavior: 'smooth' });
  saveDraft();
}

function tryGoNext() {
  const valid = validateSection(state.currentSection);
  showErrors();
  if (!valid) return;

  // Hard-Filter check (Sektion 1)
  if (state.currentSection === 1) {
    const block = isHardFilterBlocked();
    if (block) {
      // Banner zeigen, kein Weiterkommen
      const banner = document.getElementById('validation-banner');
      banner.textContent = t('validation.fix_errors');
      banner.classList.add('active');
      return;
    }
  }

  if (state.currentSection < state.totalSections) {
    showSection(state.currentSection + 1);
  } else {
    submitForm();
  }
}

function goBack() {
  if (state.currentSection > 1) {
    showSection(state.currentSection - 1);
  }
}

// ============================================================================
// SUBMIT (Phase 2a: simulate, Phase 2b: echtes INSERT)
// ============================================================================
async function submitForm() {
  const btn = document.getElementById('btn-next');
  btn.disabled = true;
  btn.innerHTML = '⏳ …';

  const d = state.formData;

  // Verfügbarkeit auf relevante Standorte filtern (keine leeren Raster mitschicken)
  const standorte = rolleStandorte(d.rollen);
  const verfuegbarkeit_export = {};
  if (standorte.length > 0) {
    standorte.forEach(s => {
      verfuegbarkeit_export[s] = d.verfuegbarkeit[s];
    });
  } else {
    verfuegbarkeit_export.allgemein = d.verfuegbarkeit.allgemein;
  }

  const payload = {
    verein_id: d.verein_id,
    vorname: d.vorname.trim(),
    nachname: d.nachname.trim(),
    geburtsdatum: d.geburtsdatum,
    staatsangehoerigkeit: d.staatsangehoerigkeit.trim(),
    adresse: { 
      strasse: d.adresse_strasse, 
      plz: d.adresse_plz, 
      ort: d.adresse_ort,
      verifiziert: d.adresse_verifiziert || 'not_checked',
      lat: d.adresse_lat,
      lon: d.adresse_lon
    },
    telefon: d.telefon.trim(),
    email: d.email.trim().toLowerCase(),
    geburtsort: d.geburtsort?.trim() || null,
    steuer_id: d.steuer_id?.trim() || null,
    sv_nummer: d.sv_nummer?.trim() || null,
    iban: d.iban?.trim() || null,
    krankenkasse: (d.kk_name || d.kk_mitgl) ? { name: d.kk_name, mitgliedsnummer: d.kk_mitgl } : null,
    ist_volljaehrig: d.ist_volljaehrig,
    wohnsitz_d_6_monate: d.wohnsitz_d_6_monate,
    ist_mitglied: d.ist_mitglied,
    ist_nicht_eu: d.ist_nicht_eu,
    arbeitserlaubnis: d.ist_nicht_eu ? d.arbeitserlaubnis : null,
    rollen: d.rollen,
    rollen_standorte: standorte.length > 0 ? standorte : ['allgemein'],
    standort_konflikt: hasStandortKonflikt(d.rollen),
    bestaetigt_zwei_standorte: d.bestaetigt_zwei_standorte,
    motivation: d.motivation.trim(),
    anstellungsformen: d.anstellungsformen,
    praevention_sachkunde: d.praevention_sachkunde,
    sicherheit_nachweis: d.sicherheit_nachweis,
    bildungsabschluss: d.bildungsabschluss,
    letzte_taetigkeit: d.letzte_taetigkeit?.trim() || null,
    vorerfahrung: d.vorerfahrung?.trim() || null,
    sprachen: d.sprachen,
    soft_skills: d.soft_skills,
    verfuegbarkeit: verfuegbarkeit_export,
    wunsch_zeiten: d.wunsch_zeiten?.trim() || null,
    wunsch_stunden_min: parseInt(d.wunsch_stunden_min) || null,
    wunsch_stunden_max: parseInt(d.wunsch_stunden_max) || null,
    bereit_we: d.bereit_we,
    bereit_feiertag: d.bereit_feiertag,
    bereit_nacht: d.bereit_nacht,
    eintritt_fruehestens: d.eintritt_fruehestens,
    kuendigungsfrist: d.kuendigungsfrist?.trim() || null,
    sperrzeiten: d.sperrzeiten?.trim() || null,
    probearbeit_bereit: d.probearbeit_bereit,
    probearbeit_orte: d.probearbeit_bereit ? d.probearbeit_orte : [],
    probearbeit_dauer: d.probearbeit_bereit ? (d.probearbeit_dauer || null) : null,
    probearbeit_anmerkung: d.probearbeit_bereit ? (d.probearbeit_anmerkung?.trim() || null) : null,
    max_anfahrt: d.max_anfahrt ? parseInt(d.max_anfahrt) : null,
    max_anfahrt_anbau: d.max_anfahrt_anbau ? parseInt(d.max_anfahrt_anbau) : null,
    fuehrerschein: d.fuehrerschein,
    eigenes_fahrzeug: d.eigenes_fahrzeug,
    jobticket: d.jobticket || null,
    sensible_einwilligung: d.sensible_einwilligung,
    sucht_relevant: d.sensible_einwilligung && d.sucht_relevant ? d.sucht_relevant : null,
    sucht_details: d.sensible_einwilligung && d.sucht_details ? d.sucht_details.trim() : null,
    schwerbehinderung: d.sensible_einwilligung && d.schwerbehinderung ? d.schwerbehinderung : null,
    schwerbehinderung_gdb: (d.sensible_einwilligung && d.schwerbehinderung === 'ja' && d.schwerbehinderung_gdb) ? d.schwerbehinderung_gdb : null,
    schwerbehinderung_einschr: (d.sensible_einwilligung && d.schwerbehinderung === 'ja' && d.schwerbehinderung_einschr) ? d.schwerbehinderung_einschr.trim() : null,
    schwerbehinderung_anpassungen: (d.sensible_einwilligung && d.schwerbehinderung === 'ja' && d.schwerbehinderung_anpassungen) ? d.schwerbehinderung_anpassungen.trim() : null,
    dsgvo_zustimmung: d.dsgvo_zustimmung,
    sprache: state.lang
  };

  try {
    // Wir generieren den Token clientseitig (UUID v4) und schicken ihn mit.
    // Das vermeidet ein anschließendes SELECT, das wegen RLS für anon problematisch sein kann.
    const clientSideToken = generateUUID();
    payload.bewerber_token = clientSideToken;
    payload.id = generateUUID();  // wir setzen die ID explizit, damit wir Datei-Uploads damit verknüpfen können
    
    // INSERT der Bewerbung
    const { error } = await sb
      .from('csc_bewerbungen')
      .insert(payload);

    if (error) throw error;
    
    // Dateien hochladen (falls vorhanden)
    const bewerbungId = payload.id;
    let uploadFehler = 0;
    
    for (let i = 0; i < d.anhaenge.length; i++) {
      const a = d.anhaenge[i];
      try {
        const ext = a.filename.split('.').pop().toLowerCase();
        const path = `${bewerbungId}/${i}-${a.kategorie}.${ext}`;
        
        const { error: uploadErr } = await sb.storage
          .from('bewerbung-anhaenge')
          .upload(path, a.file, {
            contentType: a.mime,
            upsert: false
          });
        
        if (uploadErr) {
          console.warn('Upload-Fehler für', a.filename, ':', uploadErr);
          uploadFehler++;
          continue;
        }
        
        // DB-Eintrag in csc_bewerbung_anhaenge
        await sb.from('csc_bewerbung_anhaenge').insert({
          bewerbung_id: bewerbungId,
          storage_path: path,
          original_filename: a.filename,
          mime_type: a.mime,
          file_size: a.size,
          kategorie: a.kategorie
        });
      } catch (e) {
        console.warn('Upload Exception für', a.filename, ':', e);
        uploadFehler++;
      }
    }
    
    // Success — auch wenn einzelne Uploads fehlgeschlagen sind, die Bewerbung selbst ist drin
    clearDraft();
    document.getElementById('screen-form').style.display = 'none';
    document.getElementById('screen-success').classList.add('active');
    document.getElementById('success-id').textContent = clientSideToken.substring(0, 8).toUpperCase();
    applyTranslations();
    
    if (uploadFehler > 0) {
      console.warn(`${uploadFehler} Datei(en) konnten nicht hochgeladen werden`);
    }

  } catch (e) {
    console.error('Submit-Fehler:', e);
    alert(t('errors.submit_failed') + '\n\n' + (e.message || ''));
    btn.disabled = false;
    btn.innerHTML = t('progress.submit');
  }
}

// Client-side UUID v4 generator (RFC 4122)
function generateUUID() {
  if (typeof crypto !== 'undefined' && crypto.randomUUID) {
    return crypto.randomUUID();
  }
  // Fallback für ältere Browser
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
    const r = Math.random() * 16 | 0;
    const v = c === 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}

// ============================================================================
// INITIALISIERUNG
// ============================================================================
async function init() {
  // Lang aus URL-Param oder Browser
  const params = new URLSearchParams(window.location.search);
  let lang = params.get('lang') || (navigator.language || 'de').substring(0, 2);
  if (!['de', 'en'].includes(lang)) lang = 'de';

  // Draft laden — überschreibt Lang aus Param/Browser
  loadDraft();

  // Sprache laden
  if (!await loadLang(state.lang)) {
    showError('Sprach-Datei konnte nicht geladen werden.');
    return;
  }

  // Vereine laden
  try {
    await loadVereine();
  } catch (e) {
    if (e.message === 'NO_VEREINE') {
      showError(t('errors.no_vereine'));
    } else {
      console.error(e);
      showError(t('errors.load_failed'));
    }
    return;
  }

  // UI bauen
  buildLangSelect();
  applyTranslations();
  renderSections();

  // Buttons
  document.getElementById('btn-back').addEventListener('click', goBack);
  document.getElementById('btn-next').addEventListener('click', tryGoNext);

  // Loading aus, Form an
  document.getElementById('screen-loading').classList.remove('active');
  document.getElementById('screen-form').style.display = '';

  // Sektion anzeigen
  showSection(state.currentSection);
}

function showError(msg) {
  document.getElementById('screen-loading').classList.remove('active');
  document.getElementById('screen-error').classList.add('active');
  document.getElementById('error-text').textContent = msg;
}

document.addEventListener('DOMContentLoaded', init);
</script>
