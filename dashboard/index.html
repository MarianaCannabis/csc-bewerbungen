<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mariana Cannabis · Bewerbungs-Dashboard v2</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0a120d;
      --bg-card: #131e17;
      --bg-elev: #1a2920;
      --bg-elev2: #213227;
      --border: #2a3d31;
      --border-strong: #3d5644;
      --tx: #e8f0e9;
      --tx-dim: #9eb3a4;
      --tx-mute: #6a8170;
      --green: #4caf6a;
      --green-dim: #3a8a52;
      --green-glow: rgba(76, 175, 106, 0.18);
      --gold: #f9c74f;
      --gold-bg: rgba(249, 199, 79, 0.15);
      --red: #e57373;
      --red-bg: rgba(229, 115, 115, 0.12);
      --blue: #64b5f6;
      --blue-bg: rgba(100, 181, 246, 0.12);
      --orange: #ffb74d;
      --orange-bg: rgba(255, 183, 77, 0.12);
      --purple: #ba68c8;
      --purple-bg: rgba(186, 104, 200, 0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); color: var(--tx); font-size: 15px; line-height: 1.55; min-height: 100vh; }
    code, .mono { font-family: 'DM Mono', monospace; }
    
    /* Login */
    #login { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: radial-gradient(ellipse at top, rgba(76, 175, 106, 0.08), transparent 60%), var(--bg); }
    .login-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5); }
    .login-card h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 4px; }
    .login-card .sub { color: var(--tx-dim); font-size: 13px; margin-bottom: 28px; }
    .brand-mark { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 24px; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--green); font-weight: 600; }
    .brand-mark::before { content: ''; width: 6px; height: 6px; background: var(--green); border-radius: 50%; box-shadow: 0 0 12px var(--green); }
    label { display: block; font-size: 12px; color: var(--tx-dim); margin-bottom: 6px; font-weight: 500; }
    input[type=email], input[type=text], select, textarea { width: 100%; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; padding: 11px 13px; color: var(--tx); font-family: inherit; font-size: 14px; transition: border-color 0.15s, background 0.15s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--green); background: #1d2e23; }
    button { cursor: pointer; font-family: inherit; border: none; transition: all 0.15s; }
    .btn-primary { background: var(--green); color: #0a120d; font-weight: 600; padding: 12px 18px; border-radius: 8px; width: 100%; font-size: 14px; margin-top: 16px; }
    .btn-primary:hover { background: #5fbe7d; transform: translateY(-1px); box-shadow: 0 6px 20px var(--green-glow); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .login-msg { margin-top: 16px; padding: 12px 14px; border-radius: 8px; font-size: 13px; line-height: 1.5; }
    .login-msg.success { background: var(--green-glow); border: 1px solid var(--green-dim); color: #b8e4c0; }
    .login-msg.error { background: var(--red-bg); border: 1px solid var(--red); color: #f0bcbc; }
    
    /* App */
    #app { display: none; min-height: 100vh; }
    header { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; backdrop-filter: blur(20px); }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .logo-text { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; }
    .logo-text .accent { color: var(--green); }
    .role-pill { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 10px; border-radius: 999px; font-weight: 600; }
    .role-pill.admin { background: var(--green-glow); color: var(--green); border: 1px solid var(--green-dim); }
    .role-pill.vorstand { background: var(--blue-bg); color: var(--blue); border: 1px solid #4a90c2; }
    .header-right { display: flex; align-items: center; gap: 14px; font-size: 14px; }
    .user-email { color: var(--tx-dim); }
    .btn-ghost { background: transparent; color: var(--tx-dim); padding: 9px 16px; border-radius: 6px; font-size: 13px; border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--bg-elev); color: var(--tx); }
    
    /* Statistik */
    .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; padding: 18px 24px; background: var(--bg); border-bottom: 1px solid var(--border); }
    .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; cursor: pointer; transition: all 0.15s; }
    .stat-card:hover { border-color: var(--border-strong); transform: translateY(-1px); }
    .stat-card.active { border-color: var(--green); background: #1c2b22; }
    .stat-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--tx-mute); margin-bottom: 6px; font-weight: 600; }
    .stat-value { font-size: 26px; font-weight: 700; }
    .stat-sub { font-size: 12px; color: var(--tx-dim); margin-top: 2px; }
    .stat-icon { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
    .stat-icon.eingegangen { background: var(--blue); }
    .stat-icon.in_pruefung { background: var(--orange); }
    .stat-icon.eingeladen { background: var(--green); }
    .stat-icon.warteliste { background: var(--gold); }
    .stat-icon.angenommen { background: #5fbe7d; }
    .stat-icon.abgelehnt { background: var(--red); }
    .top-vereine-box { grid-column: 1 / -1; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; }
    .top-vereine-box h3 { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--tx-mute); margin-bottom: 12px; font-weight: 600; }
    .top-vereine-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 8px; }
    .top-verein-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--bg-elev); border-radius: 6px; font-size: 14px; cursor: pointer; transition: background 0.1s; }
    .top-verein-item:hover { background: var(--bg-elev2); }
    .top-verein-name { font-weight: 500; }
    .top-verein-count { background: var(--green-glow); color: var(--green); padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    
    /* Main Layout */
    .main { display: grid; grid-template-columns: 420px 1fr; height: calc(100vh - 56px - 140px); }
    @media (max-width: 900px) { .main { grid-template-columns: 1fr; } }
    
    /* Liste */
    .list-panel { border-right: 1px solid var(--border); background: var(--bg-card); overflow: hidden; display: flex; flex-direction: column; }
    .list-header { padding: 14px 16px; border-bottom: 1px solid var(--border); background: var(--bg-card); }
    .list-title { font-size: 16px; font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .list-title .count { font-size: 11px; background: var(--bg-elev); padding: 3px 8px; border-radius: 999px; color: var(--tx-dim); font-weight: 500; }
    .filter-row { display: flex; gap: 6px; margin-bottom: 6px; }
    .filter-row select, .filter-row input { padding: 9px 11px; font-size: 13px; flex: 1; }
    .list-items { flex: 1; overflow-y: auto; }
    .list-item { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
    .list-item:hover { background: var(--bg-elev); }
    .list-item.active { background: var(--bg-elev); border-left: 3px solid var(--green); padding-left: 13px; }
    .list-item-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 4px; }
    .list-item-name { font-weight: 600; font-size: 15px; }
    .list-item-date { font-size: 12px; color: var(--tx-mute); font-family: 'DM Mono', monospace; }
    .list-item-meta { font-size: 13px; color: var(--tx-dim); display: flex; gap: 8px; align-items: center; margin-top: 4px; flex-wrap: wrap; }
    .list-item-rolle { color: var(--green); font-weight: 500; }
    .list-item-verein { font-size: 11px; color: var(--tx-mute); margin-top: 4px; }
    .list-empty { padding: 40px 24px; text-align: center; color: var(--tx-mute); font-size: 13px; }
    
    /* Status Badges */
    .status-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .status-badge.eingegangen { background: var(--blue-bg); color: var(--blue); }
    .status-badge.in_pruefung { background: var(--orange-bg); color: var(--orange); }
    .status-badge.eingeladen { background: var(--green-glow); color: var(--green); }
    .status-badge.warteliste { background: var(--gold-bg); color: var(--gold); }
    .status-badge.abgelehnt { background: var(--red-bg); color: var(--red); }
    .status-badge.angenommen { background: var(--green); color: var(--bg); }
    
    /* Detail */
    .detail-panel { overflow-y: auto; padding: 28px 36px; background: var(--bg); }
    @media (max-width: 1100px) { .detail-panel { padding: 20px 24px; } }
    .detail-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--tx-mute); font-size: 14px; text-align: center; }
    .detail-header { display: flex; align-items: flex-start; justify-content: space-between; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 24px; gap: 24px; flex-wrap: wrap; }
    .detail-name { font-size: 26px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 4px; }
    .detail-meta { color: var(--tx-dim); font-size: 13px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .detail-meta a { color: var(--blue); text-decoration: none; }
    .detail-meta a:hover { text-decoration: underline; }
    .detail-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .action-btn { padding: 8px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; border: 1px solid; background: transparent; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.03em; }
    .action-btn.einladen { border-color: var(--green-dim); color: var(--green); }
    .action-btn.einladen:hover { background: var(--green-glow); }
    .action-btn.warteliste { border-color: #c89d3a; color: var(--gold); }
    .action-btn.warteliste:hover { background: var(--gold-bg); }
    .action-btn.abgelehnt { border-color: #b85959; color: var(--red); }
    .action-btn.abgelehnt:hover { background: var(--red-bg); }
    .action-btn.loeschen { border-color: #b85959; color: #b85959; margin-left: auto; font-weight: 700; }
    .action-btn.loeschen:hover { background: #b85959; color: #fff; }
    .action-btn.angenommen { background: var(--green); color: var(--bg); border-color: var(--green); }
    .action-btn.angenommen:hover { background: #5fbe7d; }
    .action-btn.pruefen { border-color: #b88c4d; color: var(--orange); }
    .action-btn.pruefen:hover { background: var(--orange-bg); }
    
    /* Sektionen */
    .section { margin-bottom: 24px; }
    .section-title { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--tx-mute); margin-bottom: 10px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .field-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px 20px; }
    .field { display: flex; flex-direction: column; gap: 2px; }
    .field-label { font-size: 11px; color: var(--tx-mute); text-transform: uppercase; letter-spacing: 0.05em; }
    .field-value { font-size: 14px; color: var(--tx); word-break: break-word; }
    .field-value.empty { color: var(--tx-mute); font-style: italic; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
    .tag { font-size: 12px; padding: 3px 9px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 999px; color: var(--tx); }
    .tag.role { background: var(--green-glow); border-color: var(--green-dim); color: var(--green); }
    .tag.skill { background: var(--purple-bg); border-color: #884ea0; color: #d8a4e0; }
    
    /* Verfügbarkeits-Raster */
    .verfuegbar-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    .verfuegbar-title { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; font-size: 12px; font-weight: 600; color: var(--tx-dim); margin-bottom: 10px; flex-wrap: wrap; }
    .verfuegbar-summary { color: var(--tx); font-weight: 400; font-size: 12px; }
    .verfuegbar-summary strong { color: var(--green); font-weight: 700; }
    .verfuegbar-grid { display: grid; gap: 4px; font-size: 11px; }
    .vg-corner, .vg-day, .vg-slot-label { padding: 5px 6px; color: var(--tx-mute); font-weight: 600; text-align: center; text-transform: uppercase; font-size: 11px; letter-spacing: 0.05em; }
    .vg-day { text-align: left; padding-left: 8px; color: var(--tx); font-weight: 500; }
    .vg-slot-label { display: flex; flex-direction: column; align-items: center; gap: 2px; line-height: 1.1; }
    .vg-slot-time { font-size: 10px; color: var(--green); font-weight: 600; text-transform: none; letter-spacing: 0; font-family: 'DM Mono', monospace; }
    .vg-slot-sum { color: var(--tx-dim); font-size: 13px; }
    .vg-cell { padding: 7px 4px; background: var(--bg-elev); border-radius: 4px; text-align: center; font-size: 13px; color: var(--tx-mute); font-weight: 600; cursor: help; }
    .vg-cell.active { background: var(--green); color: var(--bg); }
    .vg-cell-sum { padding: 7px 4px; background: transparent; text-align: center; font-size: 12px; color: var(--green); font-weight: 700; font-family: 'DM Mono', monospace; border-left: 1px solid var(--border); margin-left: 2px; padding-left: 6px; }
    .vg-cell-sum-empty { color: var(--tx-mute); font-weight: 400; }
    .verfuegbar-gesamt { background: var(--green-glow); border: 1px solid var(--green-dim); border-radius: 8px; padding: 10px 14px; margin-bottom: 12px; font-size: 13px; color: var(--tx); display: flex; align-items: center; gap: 8px; }
    .verfuegbar-gesamt .vg-icon { font-size: 16px; }
    .verfuegbar-gesamt strong { color: var(--green); font-weight: 700; font-size: 15px; }
    
    /* Soft-Skills */
    .skill-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .skill-bar-label { width: 160px; font-size: 13px; color: var(--tx-dim); }
    .skill-bar-track { flex: 1; height: 6px; background: var(--bg-elev); border-radius: 3px; overflow: hidden; }
    .skill-bar-fill { height: 100%; background: linear-gradient(90deg, var(--green-dim), var(--green)); border-radius: 3px; }
    .skill-bar-val { width: 36px; font-size: 12px; color: var(--green); text-align: right; font-family: 'DM Mono', monospace; }
    
    /* Anhänge */
    .anhang-list { display: flex; flex-direction: column; gap: 8px; }
    .anhang-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; font-size: 13px; gap: 12px; }
    .anhang-info { flex: 1; min-width: 0; }
    .anhang-item .name { color: var(--tx); font-weight: 500; }
    .anhang-item .meta { color: var(--tx-mute); font-size: 12px; font-family: 'DM Mono', monospace; }
    .anhang-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .anhang-link { color: var(--green); text-decoration: none; font-size: 13px; font-weight: 600; padding: 6px 12px; border: 1px solid var(--green-dim); border-radius: 6px; background: transparent; cursor: pointer; transition: all 0.15s; }
    .anhang-link:hover { background: var(--green-glow); }
    
    /* Vorschau-Modal */
    .preview-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.85); z-index: 200; display: none; align-items: center; justify-content: center; padding: 24px; }
    .preview-overlay.show { display: flex; }
    .preview-container { background: var(--bg-card); border-radius: 12px; max-width: 95vw; max-height: 95vh; display: flex; flex-direction: column; box-shadow: 0 24px 60px rgba(0, 0, 0, 0.7); }
    .preview-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); }
    .preview-title { font-size: 14px; font-weight: 600; }
    .preview-close { background: transparent; border: 1px solid var(--border); color: var(--tx); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .preview-close:hover { background: var(--bg-elev); }
    .preview-body { padding: 16px; overflow: auto; flex: 1; display: flex; align-items: center; justify-content: center; min-height: 60vh; }
    .preview-body img { max-width: 100%; max-height: 80vh; object-fit: contain; border-radius: 6px; }
    .preview-body iframe { width: 90vw; height: 80vh; max-width: 1000px; border: none; border-radius: 6px; background: white; }
    .preview-loading { color: var(--tx-dim); font-size: 14px; }
    
    /* Notiz-Bereich */
    .notiz-section { background: var(--bg-card); border: 1px solid var(--border-strong); border-radius: 8px; padding: 14px 16px; margin-bottom: 24px; }
    .notiz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .notiz-header-title { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); font-weight: 600; }
    .notiz-header-meta { font-size: 10px; color: var(--tx-mute); font-family: 'DM Mono', monospace; }
    .notiz-textarea { width: 100%; min-height: 90px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; color: var(--tx); font-family: inherit; font-size: 14px; line-height: 1.5; resize: vertical; }
    .notiz-textarea:focus { outline: none; border-color: var(--gold); }
    .notiz-save-hint { font-size: 11px; color: var(--tx-mute); margin-top: 6px; }
    .notiz-save-hint.saved { color: var(--green); }
    
    /* Loading & Toast */
    .loading { display: flex; align-items: center; gap: 8px; color: var(--tx-mute); font-size: 13px; padding: 24px; }
    .loading::before { content: ''; width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg-card); border: 1px solid var(--green-dim); color: var(--tx); padding: 14px 20px; border-radius: 10px; font-size: 13px; z-index: 100; box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5); transform: translateY(100px); opacity: 0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { border-color: var(--red); }

    /* Duplikat-Badge in der Liste */
    .dup-badge {
      display: inline-block; margin-left: 6px; padding: 1px 7px;
      font-size: 10px; font-weight: 600; background: var(--gold-bg);
      border: 1px solid var(--gold); color: var(--gold);
      border-radius: 10px; vertical-align: middle;
    }
    .dup-warning {
      margin: 10px 0; padding: 10px 14px; background: var(--gold-bg);
      border-left: 3px solid var(--gold); color: var(--gold); border-radius: 0 6px 6px 0;
      font-size: 12px; line-height: 1.5;
    }
    .dup-warning strong { color: var(--gold); }
    .dup-warning a { color: var(--gold); cursor: pointer; text-decoration: underline; }

    /* ===== EDIT MODAL ===== */
    .edit-btn {
      background: transparent; border: 1px solid var(--border); color: var(--tx-mute);
      font-size: 11px; padding: 3px 10px; border-radius: 12px; cursor: pointer;
      transition: all 0.15s; margin-left: 8px; font-weight: 500;
    }
    .edit-btn:hover { color: var(--green); border-color: var(--green); background: var(--green-glow); }
    .edit-btn::before { content: '✏ '; }

    .em-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200;
      display: none; align-items: flex-start; justify-content: center;
      padding: 5vh 16px; overflow-y: auto; backdrop-filter: blur(4px);
    }
    .em-overlay.show { display: flex; }
    .em-modal {
      background: var(--bg-card); color: var(--tx); border: 1px solid var(--border);
      border-radius: 12px; max-width: 720px; width: 100%; max-height: 88vh;
      display: flex; flex-direction: column; box-shadow: 0 24px 60px rgba(0,0,0,0.6);
      overflow: hidden;
    }
    .em-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; border-bottom: 1px solid var(--border);
      background: var(--bg-elev); flex-shrink: 0;
    }
    .em-head h2 { margin: 0; font-size: 14px; font-weight: 600; color: var(--tx); }
    .em-close {
      background: transparent; border: 1px solid var(--border); color: var(--tx);
      padding: 5px 11px; border-radius: 6px; cursor: pointer; font-size: 12px;
    }
    .em-close:hover { background: var(--bg-elev2); }
    .em-body { padding: 18px; overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }
    .em-footer {

    .em-tri-opt.selected { background: var(--green-glow); color: var(--green); font-weight: 600; }

    /* Rating 0–5 */

<div id="login">

</div>

<div id="app">

    <div class="header-right">

  <div class="stats-bar" id="stats-bar"></div>
  
  <div class="main">
    <div class="list-panel">

        <div class="filter-row">
          <select id="filter-status" onchange="renderList()">
            <option value="">Alle Status</option>
            <option value="eingegangen">Eingegangen</option>
            <option value="in_pruefung">In Prüfung</option>
            <option value="eingeladen">Eingeladen</option>

          </select>
          <select id="filter-verein" onchange="renderList()" style="display:none">
            <option value="">Alle Vereine</option>
          </select>
        </div>
        <div class="filter-row">
          <select id="filter-rolle" onchange="renderList()">
            <option value="">Alle Rollen</option>
            <option value="vorstand">Vorstand</option>
            <option value="stellv_vorstand">Stellv. Vorstand</option>
            <option value="grower">Grower</option>
            <option value="head_grower">Head Grower</option>
            <option value="ausgabe">Ausgabe</option>
            <option value="springer">Springer</option>
            <option value="praevention">Prävention</option>
            <option value="reinigung">Reinigung</option>
            <option value="sicherheit">Sicherheit</option>
          </select>
          <select id="filter-bundesland" onchange="renderList()" style="display:none">
            <option value="">Alle Bundesländer</option>
          </select>
        </div>
        <div class="filter-row" style="gap:6px">
          <input type="date" id="filter-date-from" onchange="renderList()" title="Eingegangen ab" style="flex:1">
          <input type="date" id="filter-date-to" onchange="renderList()" title="Eingegangen bis" style="flex:1">
          <button class="edit-btn" onclick="resetDateFilter()" title="Datums-Filter zurücksetzen" style="margin:0">↺</button>
        </div>
        <div class="filter-row">
          <input type="text" id="filter-search" placeholder="Name, E-Mail oder Stadt..." oninput="renderList()">
        </div>
        <div class="filter-row">
          <select id="sort-by" onchange="renderList()">
            <option value="date_desc">Neueste zuerst</option>
            <option value="date_asc">Älteste zuerst</option>
            <option value="status">Nach Status</option>
            <option value="verein">Nach Verein A-Z</option>
            <option value="bundesland">Nach Bundesland</option>
            <option value="name">Nach Name A-Z</option>
          </select>
        </div>
      </div>
      <div class="list-items" id="list-items">
        <div class="loading">Lade Bewerbungen...</div>
      </div>
    </div>
    
    <div class="detail-panel" id="detail-panel">
      <div class="detail-empty">
        <div>Wähle links eine Bewerbung aus,<br>um Details zu sehen.</div>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
const SUPABASE_URL = 'https://gvzayggvtlychyjbnsgv.supabase.co';

const STATUS_LABELS = { eingegangen: 'Eingegangen', in_pruefung: 'In Prüfung', eingeladen: 'Eingeladen', warteliste: 'Warteliste', angenommen: 'Angenommen', abgelehnt: 'Abgelehnt' };
const ROLE_LABELS = { vorstand: 'Vorstand', stellv_vorstand: 'Stellv. Vorstand', grower: 'Grower', head_grower: 'Head Grower', ausgabe: 'Ausgabe', springer: 'Springer', praevention: 'Präventionsbeauftragte:r', sicherheit: 'Sicherheit', reinigung: 'Reinigung' };
const ANFAHRT_LABELS_AUSGABE = { '15': '≤ 15 min', '30': '≤ 30 min', '45': '≤ 45 min', '60': '≤ 1 h', '90': '≤ 1,5 h', '120': '≤ 2 h', '999': 'auch weiter' };
const ANFAHRT_LABELS_ANBAU = { '100': '≤ 100 km', '200': '≤ 200 km', '400': '≤ 400 km', '999': 'auch weiter' };
const SOFT_SKILL_LABELS = { stress: 'Stress-Resistenz', kunde: 'Kunden-Umgang', verschwiegenheit: 'Verschwiegenheit', team: 'Team-Arbeit', genauigkeit: 'Genauigkeit' };
const SPRACHEN_LABELS = { de: 'Deutsch', en: 'Englisch', tr: 'Türkisch', ru: 'Russisch', ar: 'Arabisch', pl: 'Polnisch', fr: 'Französisch', es: 'Spanisch' };
const SPRACH_LEVEL = { '': '–', 'a1': 'A1', 'a2': 'A2', 'b1': 'B1', 'b2': 'B2', 'c1': 'C1', 'c2': 'C2', 'native': 'Muttersprache' };
const WOCHENTAGE = [{ key: 'mo', label: 'Mo' }, { key: 'di', label: 'Di' }, { key: 'mi', label: 'Mi' }, { key: 'do', label: 'Do' }, { key: 'fr', label: 'Fr' }, { key: 'sa', label: 'Sa' }, { key: 'so', label: 'So' }];
const ZEITSLOTS = ['Früh', 'Vormittag', 'Mittag', 'Nachmittag', 'Abend'];
// Standort-spezifische Slot-Definitionen — IDENTISCH zu bewerbung.html halten!
// Index 0..4 muss konsistent zur DB-Struktur (boolean[5]) bleiben
const SLOTS_BY_STANDORT = {
  anbau: [
    { key: 'morgen',     label: 'Morgen',     zeit: '06–10', stunden: 4 },
    { key: 'mittag',     label: 'Mittag',     zeit: '10–14', stunden: 4 },
    { key: 'nachmittag', label: 'Nachmittag', zeit: '14–18', stunden: 4 },
    { key: 'abend',      label: 'Abend',      zeit: '18–22', stunden: 4 },
    { key: 'nacht',      label: 'Nacht',      zeit: '22–06', stunden: 8 }
  ],
  ausgabe: [
    { label: 'Früh',       zeit: '06–09', stunden: 3 },
    { label: 'Vormittag',  zeit: '09–12', stunden: 3 },
    { label: 'Mittag',     zeit: '12–15', stunden: 3 },
    { label: 'Nachmittag', zeit: '15–18', stunden: 3 },
    { label: 'Abend',      zeit: '18–22', stunden: 4 }
  ],
  allgemein: [
    { label: 'Früh',       zeit: '06–09', stunden: 3 },
    { label: 'Vormittag',  zeit: '09–12', stunden: 3 },
    { label: 'Mittag',     zeit: '12–15', stunden: 3 },
    { label: 'Nachmittag', zeit: '15–18', stunden: 3 },
    { label: 'Abend',      zeit: '18–22', stunden: 4 }
  ]
};
function slotsFor(standort) { return SLOTS_BY_STANDORT[standort] || SLOTS_BY_STANDORT.allgemein; }
// Legacy-Alias für Backwards-Compat in Code, der noch SLOT_DETAILS erwartet
const SLOT_DETAILS = SLOTS_BY_STANDORT.allgemein;

let sb = null, session = null, userContext = null, bewerbungen = [], vereine = {}, selectedId = null, activeStatusFilter = '';

async function init() {
  const { data: { session: existingSession } } = await sb.auth.getSession();
  if (existingSession) { session = existingSession; await loadDashboard(); }
  else showLogin();
  
  sb.auth.onAuthStateChange(async (event, newSession) => {
    if (event === 'SIGNED_IN' && newSession) { session = newSession; await loadDashboard(); }
    else if (event === 'SIGNED_OUT') { session = null; showLogin(); }
  });
}

function showLogin() { document.getElementById('login').style.display = 'flex'; document.getElementById('app').style.display = 'none'; }
function showApp() { document.getElementById('login').style.display = 'none'; document.getElementById('app').style.display = 'block'; }

async function sendMagicLink() {
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const btn = document.getElementById('login-btn');
  if (!email || !email.includes('@')) { showLoginMsg('Bitte eine gültige E-Mail-Adresse eingeben.', 'error'); return; }
  btn.disabled = true; btn.textContent = 'Sende Login-Link...';
  document.getElementById('login-msg').style.display = 'none';
  try {
    const { error } = await sb.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.href.split('#')[0].split('?')[0], shouldCreateUser: true }
    });
    if (error) showLoginMsg('Fehler: ' + error.message, 'error');
    else { showLoginMsg('Login-Link wurde an ' + email + ' geschickt. Bitte E-Mail-Postfach prüfen (auch Spam).', 'success'); btn.textContent = 'E-Mail geschickt ✓'; }
  } catch (e) { showLoginMsg('Netzwerk-Fehler: ' + e.message, 'error'); }
  finally { setTimeout(() => { btn.disabled = false; if (btn.textContent === 'Sende Login-Link...') btn.textContent = 'Login-Link senden'; }, 2000); }
}

function showLoginMsg(text, type) {
  const msgEl = document.getElementById('login-msg');
  msgEl.textContent = text; msgEl.className = 'login-msg ' + type; msgEl.style.display = 'block';
}

async function logout() { await sb.auth.signOut(); }

async function loadDashboard() {
  showApp();
  try {
    const { data: userData, error: userErr } = await sb.rpc('csc_current_user_context');
    if (userErr) throw userErr;
    if (!userData || userData.length === 0) {
      document.getElementById('list-items').innerHTML = '<div class="list-empty">Dein Account ist nicht für das Dashboard freigeschaltet.<br><br>Bitte wende dich an den Mariana-Hauptverein.</div>';
      document.getElementById('user-email').textContent = session.user.email;
      document.getElementById('role-pill').textContent = 'Kein Zugriff';
      document.getElementById('role-pill').className = 'role-pill';
      document.getElementById('stats-bar').style.display = 'none';
      return;
    }
    userContext = userData[0]; userContext.email = session.user.email;
    await sb.from('csc_dashboard_user').update({ letzter_login: new Date().toISOString() }).eq('auth_user_id', session.user.id);
  } catch (e) { toast('Fehler beim Laden des User-Kontexts: ' + e.message, true); return; }
  
  document.getElementById('user-email').textContent = userContext.email;
  const pill = document.getElementById('role-pill');
  if (userContext.ist_admin) {
    pill.textContent = 'Admin · Alle Vereine'; pill.className = 'role-pill admin';
    document.getElementById('filter-verein').style.display = '';
    document.getElementById('filter-bundesland').style.display = '';
  }
  else { pill.textContent = 'Vorstand'; pill.className = 'role-pill vorstand'; }
  
  await loadVereine();
  await loadBewerbungen();
  renderStats();
}

async function loadVereine() {
  const { data, error } = await sb.from('csc_vereine').select('id, name, ort, plz, bundesland').eq('aktiv', true);
  if (error) { console.error('Vereine:', error); return; }
  vereine = {}; data.forEach(v => { vereine[v.id] = v; });
  if (userContext.ist_admin) {
    const sel = document.getElementById('filter-verein');
    sel.innerHTML = '<option value="">Alle Vereine</option>' + data.sort((a,b) => a.name.localeCompare(b.name, 'de')).map(v => `<option value="${v.id}">${escapeHtml(v.name)}</option>`).join('');
    // Bundesländer aus Vereinen extrahieren und befüllen
    const bundeslaender = [...new Set(data.map(v => v.bundesland).filter(Boolean))].sort((a,b) => a.localeCompare(b, 'de'));
    const blSel = document.getElementById('filter-bundesland');
    blSel.innerHTML = '<option value="">Alle Bundesländer</option>' + bundeslaender.map(b => `<option value="${escapeHtml(b)}">${escapeHtml(b)}</option>`).join('');
  }
}

async function loadBewerbungen() {
  const { data, error } = await sb.from('csc_bewerbungen').select('*').order('eingegangen_am', { ascending: false });
  if (error) { document.getElementById('list-items').innerHTML = '<div class="list-empty">Fehler beim Laden: ' + escapeHtml(error.message) + '</div>'; return; }
  bewerbungen = data || [];
  renderList();
}

function renderStats() {
  const bar = document.getElementById('stats-bar');
  const counts = {};
  Object.keys(STATUS_LABELS).forEach(s => counts[s] = 0);
  bewerbungen.forEach(b => { const s = b.status || 'eingegangen'; counts[s] = (counts[s] || 0) + 1; });
  const total = bewerbungen.length;
  const heute = new Date().toISOString().slice(0, 10);
  const heuteCount = bewerbungen.filter(b => b.eingegangen_am && b.eingegangen_am.startsWith(heute)).length;
  
  const cards = [
    { key: '', label: 'Gesamt', value: total, sub: heuteCount > 0 ? `+${heuteCount} heute` : '', icon: null },
    { key: 'eingegangen', label: 'Eingegangen', value: counts.eingegangen, sub: 'noch nicht geprüft', icon: 'eingegangen' },
    { key: 'in_pruefung', label: 'In Prüfung', value: counts.in_pruefung, sub: 'bei Vorstand', icon: 'in_pruefung' },
    { key: 'eingeladen', label: 'Eingeladen', value: counts.eingeladen, sub: 'Gespräch geplant', icon: 'eingeladen' },
    { key: 'warteliste', label: 'Warteliste', value: counts.warteliste, sub: 'für Reserve-Pool', icon: 'warteliste' },
    { key: 'angenommen', label: 'Angenommen', value: counts.angenommen, sub: 'aktiv im Verein', icon: 'angenommen' },
  ];
  
  let html = cards.map(c => `
    <div class="stat-card ${activeStatusFilter === c.key ? 'active' : ''}" onclick="setStatusFilter('${c.key}')">
      <div class="stat-label">${c.icon ? `<span class="stat-icon ${c.icon}"></span>` : ''}${c.label}</div>
      <div class="stat-value">${c.value}</div>
      ${c.sub ? `<div class="stat-sub">${c.sub}</div>` : ''}
    </div>
  `).join('');
  
  if (userContext.ist_admin && total > 0) {
    const vereinCounts = {};
    bewerbungen.forEach(b => { vereinCounts[b.verein_id] = (vereinCounts[b.verein_id] || 0) + 1; });
    const topVereine = Object.entries(vereinCounts)
      .map(([id, count]) => ({ id, name: vereine[id]?.name || 'Unbekannt', count }))
      .sort((a, b) => b.count - a.count).slice(0, 5);
    if (topVereine.length > 0) {
      html += `<div class="top-vereine-box"><h3>Top Vereine (nach Bewerbungs-Anzahl)</h3><div class="top-vereine-list">${topVereine.map(v => `<div class="top-verein-item" onclick="filterByVerein('${v.id}')"><span class="top-verein-name">${escapeHtml(v.name)}</span><span class="top-verein-count">${v.count}</span></div>`).join('')}</div></div>`;
    }
  }
  bar.innerHTML = html;
}

function setStatusFilter(status) {
  activeStatusFilter = activeStatusFilter === status ? '' : status;
  document.getElementById('filter-status').value = activeStatusFilter;
  renderStats(); renderList();
}

function filterByVerein(vereinId) { document.getElementById('filter-verein').value = vereinId; renderList(); }
function resetDateFilter() {
  document.getElementById('filter-date-from').value = '';
  document.getElementById('filter-date-to').value = '';
  renderList();
}

function renderList() {
  const statusFilter = document.getElementById('filter-status').value;
  const vereinFilter = document.getElementById('filter-verein').value;
  const rolleFilter = document.getElementById('filter-rolle').value;
  const bundeslandFilter = document.getElementById('filter-bundesland')?.value || '';
  const dateFrom = document.getElementById('filter-date-from').value;
  const dateTo = document.getElementById('filter-date-to').value;
  const searchTerm = document.getElementById('filter-search').value.toLowerCase().trim();
  const sortBy = document.getElementById('sort-by').value;
  activeStatusFilter = statusFilter;

  // Duplikat-Map: E-Mail (lowercase) → Anzahl der Bewerbungen
  const emailCounts = {};
  bewerbungen.forEach(b => {
    const e = (b.email || '').trim().toLowerCase();
    if (e) emailCounts[e] = (emailCounts[e] || 0) + 1;
  });

  let filtered = bewerbungen;
  if (statusFilter) filtered = filtered.filter(b => (b.status || 'eingegangen') === statusFilter);
  if (vereinFilter) filtered = filtered.filter(b => b.verein_id === vereinFilter);
  if (rolleFilter) filtered = filtered.filter(b => Array.isArray(b.rollen) && b.rollen.includes(rolleFilter));
  if (bundeslandFilter) filtered = filtered.filter(b => (vereine[b.verein_id]?.bundesland || '') === bundeslandFilter);
  if (dateFrom) {
    const from = new Date(dateFrom + 'T00:00:00');
    filtered = filtered.filter(b => b.eingegangen_am && new Date(b.eingegangen_am) >= from);
  }
  if (dateTo) {
    const to = new Date(dateTo + 'T23:59:59');
    filtered = filtered.filter(b => b.eingegangen_am && new Date(b.eingegangen_am) <= to);
  }
  if (searchTerm) {
    filtered = filtered.filter(b => {
      const hay = [b.vorname, b.nachname, b.email, b.adresse?.ort, b.adresse?.plz, b.adresse?.stadt, vereine[b.verein_id]?.name].filter(Boolean).join(' ').toLowerCase();
      return hay.includes(searchTerm);
    });
  }
  
  const statusOrder = ['eingegangen', 'in_pruefung', 'eingeladen', 'warteliste', 'angenommen', 'abgelehnt'];
  filtered.sort((a, b) => {
    switch (sortBy) {
      case 'date_asc': return new Date(a.eingegangen_am || 0) - new Date(b.eingegangen_am || 0);
      case 'date_desc': return new Date(b.eingegangen_am || 0) - new Date(a.eingegangen_am || 0);
      case 'status': { const sA = statusOrder.indexOf(a.status || 'eingegangen'); const sB = statusOrder.indexOf(b.status || 'eingegangen'); if (sA !== sB) return sA - sB; return new Date(b.eingegangen_am || 0) - new Date(a.eingegangen_am || 0); }
      case 'verein': return (vereine[a.verein_id]?.name || '').localeCompare(vereine[b.verein_id]?.name || '', 'de');
      case 'bundesland': { const bA = vereine[a.verein_id]?.bundesland || ''; const bB = vereine[b.verein_id]?.bundesland || ''; if (bA !== bB) return bA.localeCompare(bB, 'de'); return (vereine[a.verein_id]?.name || '').localeCompare(vereine[b.verein_id]?.name || '', 'de'); }
      case 'name': return ((a.nachname || '') + ' ' + (a.vorname || '')).localeCompare((b.nachname || '') + ' ' + (b.vorname || ''), 'de');
      default: return 0;
    }
  });
  
  document.getElementById('list-count').textContent = filtered.length;
  const container = document.getElementById('list-items');
  if (filtered.length === 0) { container.innerHTML = '<div class="list-empty">Keine Bewerbungen gefunden.</div>'; return; }
  
  container.innerHTML = filtered.map(b => {
    const v = vereine[b.verein_id];
    const status = b.status || 'eingegangen';
    const rollen = Array.isArray(b.rollen) ? b.rollen : [];
    const rollenLabel = rollen.slice(0, 2).map(r => ROLE_LABELS[r] || r).join(', ') + (rollen.length > 2 ? ` +${rollen.length - 2}` : '');
    const date = b.eingegangen_am ? new Date(b.eingegangen_am).toLocaleDateString('de-DE', {day:'2-digit',month:'2-digit'}) : '–';
    const emailLow = (b.email || '').trim().toLowerCase();
    const dupCount = emailLow ? emailCounts[emailLow] : 0;
    const dupBadge = dupCount > 1 ? `<span class="dup-badge" title="${dupCount} Bewerbungen mit dieser E-Mail">🔁 ${dupCount}×</span>` : '';
    return `<div class="list-item ${b.id === selectedId ? 'active' : ''}" onclick="selectBewerbung('${b.id}')"><div class="list-item-top"><div class="list-item-name">${escapeHtml(b.vorname || '')} ${escapeHtml(b.nachname || '')} ${dupBadge}</div><div class="list-item-date">${date}</div></div><div class="list-item-meta"><span class="status-badge ${status}">${STATUS_LABELS[status] || status}</span><span class="list-item-rolle">${escapeHtml(rollenLabel || '–')}</span></div>${userContext.ist_admin && v ? `<div class="list-item-verein">${escapeHtml(v.name)}</div>` : ''}</div>`;
  }).join('');
}

async function selectBewerbung(id) {
  selectedId = id; renderList();
  const b = bewerbungen.find(x => x.id === id);
  if (!b) return;
  const v = vereine[b.verein_id];
  const status = b.status || 'eingegangen';
  
  let anhaenge = [];
  try { const { data: ah } = await sb.from('csc_bewerbung_anhaenge').select('*').eq('bewerbung_id', id); anhaenge = ah || []; }
  catch (e) { console.error('Anhänge:', e); }
  
  const fmt = (val) => val ? escapeHtml(String(val)) : '<span class="empty">–</span>';
  const fmtDate = (val) => val ? new Date(val).toLocaleDateString('de-DE') : '<span class="empty">–</span>';
  const fmtBool = (val) => val === true ? 'Ja' : val === false ? 'Nein' : '<span class="empty">–</span>';
  const fmtList = (arr) => Array.isArray(arr) && arr.length ? arr.map(x => `<span class="tag">${escapeHtml(ROLE_LABELS[x] || x)}</span>`).join('') : '<span class="empty">–</span>';
  const fmtRoles = (arr) => Array.isArray(arr) && arr.length ? arr.map(x => `<span class="tag role">${escapeHtml(ROLE_LABELS[x] || x)}</span>`).join('') : '<span class="empty">–</span>';
  
  const anfahrtAusgabe = b.max_anfahrt ? (ANFAHRT_LABELS_AUSGABE[String(b.max_anfahrt)] || b.max_anfahrt + ' min') : null;
  const anfahrtAnbau = b.max_anfahrt_anbau ? (ANFAHRT_LABELS_ANBAU[String(b.max_anfahrt_anbau)] || b.max_anfahrt_anbau + ' km') : null;
  
  const adresse = b.adresse || {};
  const adresseStr = [adresse.strasse, [adresse.plz, adresse.ort || adresse.stadt].filter(Boolean).join(' ')].filter(Boolean).join(', ') || '–';
  
  function buildVerfuegbarkeitGrid(standort, label) {
    const verf = b.verfuegbarkeit && b.verfuegbarkeit[standort];
    if (!verf) return '';
    
    // Standort-spezifische Slot-Definitionen
    const slotDefs = slotsFor(standort);
    
    // Zähle aktive Slots + summe Stunden
    let aktiveSlots = 0;
    let totalStunden = 0;
    WOCHENTAGE.forEach(d => {
      (verf[d.key] || []).forEach((checked, i) => {
        if (checked) {
          aktiveSlots++;
          totalStunden += slotDefs[i]?.stunden || 4;
        }
      });
    });
    if (aktiveSlots === 0) return '';
    
    // Header: Slot-Label + Uhrzeit
    const slotHeaders = slotDefs.map(s => 
      `<div class="vg-slot-label"><div>${s.label}</div><div class="vg-slot-time">${s.zeit}</div></div>`
    ).join('');
    
    // Pro Wochentag: Tag-Label + 5 Cells + Tages-Stunden-Summe
    const rows = WOCHENTAGE.map(d => {
      const slots = verf[d.key] || [];
      const dayHours = slots.reduce((sum, checked, i) => sum + (checked ? (slotDefs[i]?.stunden || 0) : 0), 0);
      const cells = slotDefs.map((sl, i) => 
        `<div class="vg-cell ${slots[i] ? 'active' : ''}" title="${sl.label} (${sl.zeit} Uhr)">${slots[i] ? '✓' : '·'}</div>`
      ).join('');
      const sumCell = dayHours > 0 
        ? `<div class="vg-cell-sum">${dayHours}h</div>` 
        : `<div class="vg-cell-sum vg-cell-sum-empty">–</div>`;
      return `<div class="vg-day">${d.label}</div>${cells}${sumCell}`;
    }).join('');
    
    return `
      <div class="verfuegbar-section">
        <div class="verfuegbar-title">
          <span>${label}</span>
          <span class="verfuegbar-summary">${aktiveSlots} Slot${aktiveSlots !== 1 ? 's' : ''} · ca. <strong>${totalStunden}h/Woche</strong> möglich</span>
        </div>
        <div class="verfuegbar-grid" style="grid-template-columns: 36px repeat(5, 1fr) 50px">
          <div class="vg-corner"></div>
          ${slotHeaders}
          <div class="vg-slot-label vg-slot-sum">Σ</div>
          ${rows}
        </div>
      </div>
    `;
  }
  
  let verfHtml = '';
  verfHtml += buildVerfuegbarkeitGrid('anbau', 'Anbauanlage');
  verfHtml += buildVerfuegbarkeitGrid('ausgabe', 'Ausgabe');
  verfHtml += buildVerfuegbarkeitGrid('allgemein', 'Allgemein');
  
  // Gesamt-Wochenstunden berechnen (Summe ueber alle Standorte)
  let gesamtStunden = 0;
  let gesamtSlots = 0;
  ['anbau', 'ausgabe', 'allgemein'].forEach(standort => {
    const verf = b.verfuegbarkeit && b.verfuegbarkeit[standort];
    if (!verf) return;
    const slotDefs = slotsFor(standort);
    WOCHENTAGE.forEach(d => {
      (verf[d.key] || []).forEach((checked, i) => {
        if (checked) {
          gesamtStunden += slotDefs[i]?.stunden || 4;
          gesamtSlots++;
        }
      });
    });
  });
  const gesamtSummaryHtml = gesamtSlots > 0 
    ? `<div class="verfuegbar-gesamt"><span class="vg-icon">⏱</span> Gesamt-Verfügbarkeit: <strong>${gesamtStunden}h/Woche</strong> in ${gesamtSlots} Slot${gesamtSlots !== 1 ? 's' : ''}</div>` 
    : '';
  
  const sprachenList = b.sprachen ? Object.entries(b.sprachen).filter(([k, v]) => v && v !== '').map(([k, v]) => `<span class="tag">${SPRACHEN_LABELS[k] || k}: ${SPRACH_LEVEL[v] || v}</span>`).join('') : '';
  
  let softSkillsHtml = '';
  if (b.soft_skills && typeof b.soft_skills === 'object') {
    const skills = Object.entries(b.soft_skills).filter(([k,v]) => v > 0);
    if (skills.length > 0) {

    }
  }
  
  // Duplikat-Erkennung: andere Bewerbungen mit selber E-Mail
  const emailLow = (b.email || '').trim().toLowerCase();
  const dupBewerbungen = emailLow ? bewerbungen.filter(x => x.id !== b.id && (x.email || '').trim().toLowerCase() === emailLow) : [];

      }).join(' · ')}</div>
    </div>` : '';

  const html = `

async function setStatus(id, newStatus) {
  const b = bewerbungen.find(x => x.id === id);
  if (!b) return;
  const confirmed = confirm(`Status auf "${STATUS_LABELS[newStatus]}" setzen?\n\n${b.vorname} ${b.nachname}`);
  if (!confirmed) return;
  try {
    // status_geaendert_am und status_geaendert_von werden via Trigger automatisch gesetzt
    const { error } = await sb.from('csc_bewerbungen').update({ status: newStatus }).eq('id', id);
    if (error) throw error;
    b.status = newStatus; 
    b.status_geaendert_am = new Date().toISOString();
    b.status_geaendert_von = session.user.email;
    renderList(); selectBewerbung(id); renderStats();
    toast('Status auf "' + STATUS_LABELS[newStatus] + '" gesetzt');
  } catch (e) { toast('Fehler: ' + e.message, true); }
}

// Notiz speichern (onblur)
async function saveNotiz(id) {
  const b = bewerbungen.find(x => x.id === id);
  if (!b) return;
  const textarea = document.getElementById('notiz-textarea');
  if (!textarea) return;
  const newText = textarea.value;
  if (newText === (b.vorstand_notiz || '')) return;  // keine Änderung
  
  const hint = document.getElementById('notiz-save-hint');
  hint.textContent = 'Speichere...';
  hint.classList.remove('saved');
  
  try {
    const { error } = await sb.from('csc_bewerbungen')
      .update({ vorstand_notiz: newText })
      .eq('id', id);
    if (error) throw error;
    
    b.vorstand_notiz = newText;
    b.notiz_geaendert_am = new Date().toISOString();
    b.notiz_geaendert_von = session.user.email;
    
    // Meta-Info aktualisieren
    const meta = document.getElementById('notiz-meta');
    if (meta) {
      meta.textContent = 'zuletzt: ' + new Date().toLocaleString('de-DE', {day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}) + ' · ' + session.user.email;
    }
    
    hint.textContent = '✓ Gespeichert';
    hint.classList.add('saved');
    setTimeout(() => {
      hint.textContent = 'Speichert automatisch beim Verlassen des Felds';
      hint.classList.remove('saved');
    }, 2500);
  } catch (e) {
    hint.textContent = 'Fehler: ' + e.message;
    toast('Notiz konnte nicht gespeichert werden: ' + e.message, true);
  }
}

// CSV Export — alle aktuell sichtbaren Bewerbungen
function exportCsv() {
  // Aktuelle Filter anwenden um zu wissen was sichtbar ist
  const statusFilter = document.getElementById('filter-status').value;
  const vereinFilter = document.getElementById('filter-verein').value;
  const searchTerm = document.getElementById('filter-search').value.toLowerCase().trim();
  
  let filtered = bewerbungen;
  if (statusFilter) filtered = filtered.filter(b => (b.status || 'eingegangen') === statusFilter);
  if (vereinFilter) filtered = filtered.filter(b => b.verein_id === vereinFilter);
  if (searchTerm) {
    filtered = filtered.filter(b => {
      const hay = [b.vorname, b.nachname, b.email, b.adresse?.ort, b.adresse?.plz, vereine[b.verein_id]?.name].filter(Boolean).join(' ').toLowerCase();
      return hay.includes(searchTerm);
    });
  }
  
  if (filtered.length === 0) {
    toast('Keine Bewerbungen zum Exportieren', true);
    return;
  }
  
  // CSV-Spalten — vollständige Bewerber-Daten für Excel/Vorstand
  const headers = [
    'Eingegangen', 'Status', 'Bewerbungs-ID', 'Verein', 'Bundesland',
    'Vorname', 'Nachname', 'E-Mail', 'Telefon',
    'Geburtsdatum', 'Geburtsort', 'Staatsangehörigkeit',
    'PLZ', 'Stadt', 'Straße',
    'Wohnsitz DE 6 Mon.', 'Volljährig', 'Nicht-EU', 'Arbeitserlaubnis', 'CSC-Mitglied', 'Mitgliedsnummer', 'Möchte Mitglied werden', 'Terptrain weitergeleitet', 'Terptrain bestätigt',
    'Rollen', 'Anstellungsform', 'Standorte',
    'Motivation',
    'Stunden min', 'Stunden max', 'Frühester Einstieg', 'Kündigungsfrist',
    'Max Anfahrt Ausgabe', 'Max Anfahrt Anbau',
    'Wochenende', 'Feiertag', 'Nacht', 'Jobticket', 'Fahrzeug', 'Führerschein',
    'Wunsch-Zeiten', 'Sperrzeiten',
    'Probearbeit bereit', 'Probearbeit Dauer', 'Probearbeit Orte', 'Probearbeit Anmerkung',
    'Bildung', 'Letzte Tätigkeit', 'Vorerfahrung',
    'Sprachen', 'Soft-Skills',
    'Sachkunde Prävention', 'Sicherheits-Nachweis',
    'Sucht relevant', 'Sucht Details',
    'Schwerbehinderung', 'GdB', 'Einschränkungen', 'Anpassungen',
    'Steuer-ID', 'SV-Nr.', 'Krankenkasse', 'IBAN',
    'DSGVO-Zustimmung', 'DSGVO-Zeitstempel',
    'Notiz', 'Notiz geändert am', 'Notiz von',
    'Status geändert am', 'Status geändert von'
  ];
  
  const rows = filtered.map(b => {
    const v = vereine[b.verein_id];
    const rollen = Array.isArray(b.rollen) ? b.rollen.map(r => ROLE_LABELS[r] || r).join('; ') : '';
    const anstellung = Array.isArray(b.anstellungsformen) ? b.anstellungsformen.join('; ') : '';
    const standorte = Array.isArray(b.rollen_standorte) ? b.rollen_standorte.join('; ') : '';
    const anfA = b.max_anfahrt ? (ANFAHRT_LABELS_AUSGABE[String(b.max_anfahrt)] || b.max_anfahrt) : '';
    const anfB = b.max_anfahrt_anbau ? (ANFAHRT_LABELS_ANBAU[String(b.max_anfahrt_anbau)] || b.max_anfahrt_anbau) : '';
    const fs = Array.isArray(b.fuehrerschein) ? b.fuehrerschein.join('; ') : (b.fuehrerschein === true ? 'Ja' : (b.fuehrerschein === false ? 'Nein' : ''));
    const probeOrte = Array.isArray(b.probearbeit_orte) ? b.probearbeit_orte.join('; ') : '';
    const sprachen = b.sprachen ? Object.entries(b.sprachen).filter(([k,v]) => v && v !== '').map(([k,v]) => (SPRACHEN_LABELS[k] || k) + ': ' + (SPRACH_LEVEL[v] || v)).join('; ') : '';
    const softSkills = b.soft_skills ? Object.entries(b.soft_skills).filter(([k,v]) => v > 0).map(([k,v]) => (SOFT_SKILL_LABELS[k] || k) + ': ' + v + '/5').join('; ') : '';
    
    return [
      b.eingegangen_am ? new Date(b.eingegangen_am).toLocaleDateString('de-DE') : '',
      STATUS_LABELS[b.status || 'eingegangen'] || b.status || '',
      b.id ? b.id.slice(0, 8).toUpperCase() : '',
      v?.name || '', v?.bundesland || '',
      b.vorname || '', b.nachname || '', b.email || '', b.telefon || '',
      b.geburtsdatum ? new Date(b.geburtsdatum).toLocaleDateString('de-DE') : '',
      b.geburtsort || '', b.staatsangehoerigkeit || '',
      b.adresse?.plz || '', b.adresse?.ort || b.adresse?.stadt || '', b.adresse?.strasse || '',
      b.wohnsitz_d_6_monate === true ? 'Ja' : (b.wohnsitz_d_6_monate === false ? 'Nein' : ''),
      b.ist_volljaehrig === true ? 'Ja' : (b.ist_volljaehrig === false ? 'Nein' : ''),
      b.ist_nicht_eu === true ? 'Ja' : (b.ist_nicht_eu === false ? 'Nein' : ''),
      b.arbeitserlaubnis === true ? 'Ja' : (b.arbeitserlaubnis === false ? 'Nein' : ''),
      b.ist_mitglied || '',
      b.mitgliedsnummer || '',
      b.moechte_mitglied_werden === true ? 'Ja' : '',
      b.terptrain_weitergeleitet_am ? new Date(b.terptrain_weitergeleitet_am).toLocaleString('de-DE') : '',
      b.terptrain_anmeldung_bestaetigt === true ? 'Ja' : (b.terptrain_anmeldung_bestaetigt === false ? 'Noch nicht' : ''),
      rollen, anstellung, standorte,
      b.motivation || '',
      b.wunsch_stunden_min || '', b.wunsch_stunden_max || '',
      b.eintritt_fruehestens ? new Date(b.eintritt_fruehestens).toLocaleDateString('de-DE') : '',
      b.kuendigungsfrist || '',
      anfA, anfB,
      b.bereit_we === true ? 'Ja' : (b.bereit_we === false ? 'Nein' : ''),
      b.bereit_feiertag === true ? 'Ja' : (b.bereit_feiertag === false ? 'Nein' : ''),
      b.bereit_nacht === true ? 'Ja' : (b.bereit_nacht === false ? 'Nein' : ''),
      b.jobticket || '',
      b.eigenes_fahrzeug === true ? 'Ja' : (b.eigenes_fahrzeug === false ? 'Nein' : ''),
      fs,
      b.wunsch_zeiten || '', b.sperrzeiten || '',
      b.probearbeit_bereit === true ? 'Ja' : (b.probearbeit_bereit === false ? 'Nein' : ''),
      b.probearbeit_dauer || '', probeOrte, b.probearbeit_anmerkung || '',
      b.bildungsabschluss || '', b.letzte_taetigkeit || '', b.vorerfahrung || '',
      sprachen, softSkills,
      b.praevention_sachkunde || '',
      b.sicherheit_nachweis === true ? 'Ja' : (b.sicherheit_nachweis === false ? 'Nein' : ''),
      b.sucht_relevant || '', b.sucht_details || '',
      b.schwerbehinderung || '', b.schwerbehinderung_gdb || '',
      b.schwerbehinderung_einschr || '', b.schwerbehinderung_anpassungen || '',
      b.steuer_id || '', b.sv_nummer || '', b.krankenkasse || '', b.iban || '',
      b.dsgvo_zustimmung === true ? 'Ja' : '',
      b.dsgvo_zeitstempel ? new Date(b.dsgvo_zeitstempel).toLocaleString('de-DE') : '',
      b.vorstand_notiz || '',
      b.notiz_geaendert_am ? new Date(b.notiz_geaendert_am).toLocaleString('de-DE') : '',
      b.notiz_geaendert_von || '',
      b.status_geaendert_am ? new Date(b.status_geaendert_am).toLocaleString('de-DE') : '',
      b.status_geaendert_von || ''
    ];
  });
  
  // CSV bauen (Excel-kompatibel: Semikolon-getrennt, UTF-8 BOM)
  const escapeCsv = (val) => {
    if (val == null) return '';
    const s = String(val);
    if (s.includes(';') || s.includes('"') || s.includes('\n') || s.includes('\r')) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  };
  
  const csv = '\uFEFF' + // UTF-8 BOM für Excel
    headers.map(escapeCsv).join(';') + '\r\n' +
    rows.map(r => r.map(escapeCsv).join(';')).join('\r\n');
  
  // Download triggern
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const today = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `mariana-bewerbungen-${today}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  
  toast(`${filtered.length} Bewerbungen exportiert`);
}

// Bewerbung loeschen (Hard-Delete, nur Admin, DSGVO-konform)
async function deleteBewerbung(id) {
  if (!userContext || !userContext.ist_admin) {
    toast('Nur Administratoren können Bewerbungen löschen', true);
    return;
  }
  
  const b = bewerbungen.find(x => x.id === id);
  if (!b) return;
  
  // 1. Bestätigung: Bewerbungs-Daten
  const name = `${b.vorname || ''} ${b.nachname || ''}`.trim() || '(ohne Namen)';
  const eingegangenStr = b.eingegangen_am ? new Date(b.eingegangen_am).toLocaleDateString('de-DE') : '–';
  const c1 = confirm(
    `⚠️ Bewerbung dauerhaft löschen?\n\n` +
    `${name}\n` +
    `Eingegangen: ${eingegangenStr}\n` +
    `Status: ${STATUS_LABELS[b.status] || b.status}\n\n` +
    `Diese Aktion ist NICHT rückgängig zu machen.\n` +
    `Alle Bewerbungsdaten und Anhänge werden aus dem System entfernt.\n\n` +
    `Wirklich fortfahren?`
  );
  if (!c1) return;
  
  // 2. Bestätigung: Tippen
  const c2 = prompt(
    `Letzte Bestätigung:\n\nTippe LÖSCHEN (in Großbuchstaben) und drücke OK, um die Bewerbung von ${name} endgültig zu löschen.`
  );
  if (c2 !== 'LÖSCHEN') {
    toast('Löschung abgebrochen', false);
    return;
  }
  
  try {
    // Storage-Anhänge zuerst löschen
    const { data: anh } = await sb.from('csc_bewerbung_anhaenge').select('storage_pfad').eq('bewerbung_id', id);
    if (anh && anh.length > 0) {
      const paths = anh.map(a => a.storage_pfad).filter(Boolean);
      if (paths.length > 0) {
        const { error: storageErr } = await sb.storage.from('bewerbung-anhaenge').remove(paths);
        if (storageErr) console.warn('Storage-Löschung teilweise fehlgeschlagen:', storageErr);
      }
    }
    
    // DB-Eintrag löschen (CASCADE löscht zugehörige anhaenge-Einträge)
    const { error } = await sb.from('csc_bewerbungen').delete().eq('id', id);
    if (error) throw error;
    
    // Aus lokalem State entfernen
    bewerbungen = bewerbungen.filter(x => x.id !== id);
    selectedId = null;
    document.getElementById('detail-panel').innerHTML = '<div class="empty-state">Bewerbung links auswählen</div>';
    renderList();
    renderStats();
    toast(`Bewerbung von ${name} wurde gelöscht`);
  } catch (e) {
    toast('Löschfehler: ' + e.message, true);
  }
}

async function downloadAnhang(storagePfad, filename) {
  if (!storagePfad) { toast('Kein Storage-Pfad hinterlegt', true); return; }
  try {
    const { data, error } = await sb.storage.from('bewerbung-anhaenge').createSignedUrl(storagePfad, 60);
    if (error) throw error;
    const a = document.createElement('a'); a.href = data.signedUrl; a.download = filename; a.click();
  } catch (e) { toast('Download-Fehler: ' + e.message, true); }
}

async function previewAnhang(storagePfad, filename, type) {
  if (!storagePfad) { toast('Kein Storage-Pfad hinterlegt', true); return; }
  
  // Modal anzeigen mit Loading-State
  const overlay = document.getElementById('preview-overlay');
  const titleEl = document.getElementById('preview-title');
  const bodyEl = document.getElementById('preview-body');
  
  if (!overlay) { toast('Vorschau-Modal nicht gefunden', true); return; }
  
  titleEl.textContent = filename;
  bodyEl.innerHTML = '<div class="preview-loading">⏳ Lade Vorschau...</div>';
  overlay.classList.add('show');
  
  try {
    // Signed URL holen (5 Min gueltig fuer Vorschau)
    const { data, error } = await sb.storage.from('bewerbung-anhaenge').createSignedUrl(storagePfad, 300);
    if (error) throw error;
    const url = data.signedUrl;
    
    if (type === 'image') {
      bodyEl.innerHTML = `<img src="${url}" alt="${escapeHtml(filename)}">`;
    } else if (type === 'pdf') {
      bodyEl.innerHTML = `<iframe src="${url}#toolbar=1" title="${escapeHtml(filename)}"></iframe>`;
    } else {
      bodyEl.innerHTML = `<div class="preview-loading">Vorschau f&uuml;r diesen Dateityp nicht m&ouml;glich. Bitte herunterladen.</div>`;
    }
  } catch (e) {
    bodyEl.innerHTML = `<div class="preview-loading" style="color:var(--red)">Fehler: ${escapeHtml(e.message)}</div>`;
  }
}

function closePreview() {
  const overlay = document.getElementById('preview-overlay');
  if (overlay) {
    overlay.classList.remove('show');
    // Body leeren damit Videos/PDFs nicht im Hintergrund weiterlaufen
    const bodyEl = document.getElementById('preview-body');
    if (bodyEl) bodyEl.innerHTML = '';
  }
}

// ESC-Taste schliesst Vorschau
window.addEventListener('keydown', e => {
  if (e.key === 'Escape') closePreview();
});

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

let toastTimer = null;
function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ----- Helpers für nested keys (z.B. "adresse.strasse") -----
function getNested(obj, path) {
  if (!path.includes('.')) return obj?.[path];
  return path.split('.').reduce((o, k) => o?.[k], obj);
}
function setNested(obj, path, value) {
  if (!path.includes('.')) { obj[path] = value; return; }
  const parts = path.split('.');
  let cur = obj;
  for (let i = 0; i < parts.length - 1; i++) {
    if (!cur[parts[i]] || typeof cur[parts[i]] !== 'object') cur[parts[i]] = {};
    cur = cur[parts[i]];
  }
  cur[parts[parts.length - 1]] = value;
}

// ----- Field-Renderer -----
function renderEditField(f, value) {
  const id = 'ef-' + f.k.replace(/\./g, '__');
  const ph = f.placeholder || '';
  const im = f.inputmode ? ` inputmode="${f.inputmode}"` : '';
  const ml = f.maxlength ? ` maxlength="${f.maxlength}"` : '';
  const lbl = f.l ? `<label class="em-field-label" for="${id}">${escapeHtml(f.l)}</label>` : '';

  switch (f.t) {
    case 'text': case 'email': case 'tel': case 'url': {
      const type = f.t === 'text' ? 'text' : f.t;
      const v = value == null ? '' : String(value);
      return `<div class="em-field" data-row="${f.row||''}">${lbl}<input id="${id}" class="em-input" type="${type}" data-k="${f.k}" data-t="${f.t}" value="${escapeHtml(v)}" placeholder="${escapeHtml(ph)}"${im}${ml}></div>`;
    }
    case 'number': {
      const v = value == null ? '' : String(value);
      const mn = f.min != null ? ` min="${f.min}"` : '';
      const mx = f.max != null ? ` max="${f.max}"` : '';
      return `<div class="em-field" data-row="${f.row||''}">${lbl}<input id="${id}" class="em-input" type="number" data-k="${f.k}" data-t="number" value="${escapeHtml(v)}"${mn}${mx} inputmode="numeric"></div>`;
    }
    case 'textarea': {
      const v = value == null ? '' : String(value);
      return `<div class="em-field">${lbl}<textarea id="${id}" class="em-textarea" data-k="${f.k}" data-t="textarea">${escapeHtml(v)}</textarea></div>`;
    }
    case 'date_de': {
      const display = value ? toDeDate(value) : '';
      return `<div class="em-field" data-row="${f.row||''}">${lbl}<input id="${id}" class="em-input" type="text" data-k="${f.k}" data-t="date_de" value="${escapeHtml(display)}" placeholder="TT.MM.JJJJ" inputmode="numeric" maxlength="10"></div>`;
    }
    case 'boolean_tri': {
      const sel = (v) => value === v ? 'selected' : '';
      return `<div class="em-field" data-row="${f.row||''}">${lbl}<div class="em-tri" data-k="${f.k}" data-t="boolean_tri">
        <span class="em-tri-opt ${sel(true)}" data-v="true">Ja</span>
        <span class="em-tri-opt ${sel(false)}" data-v="false">Nein</span>
        <span class="em-tri-opt ${value==null?'selected':''}" data-v="">—</span>
      </div></div>`;
    }
    case 'select': {
      const opts = f.options.map(([v, lab]) => `<option value="${escapeHtml(v)}" ${String(value)===String(v)?'selected':''}>${escapeHtml(lab)}</option>`).join('');
      return `<div class="em-field" data-row="${f.row||''}">${lbl}<select id="${id}" class="em-select" data-k="${f.k}" data-t="select">${opts}</select></div>`;
    }
    case 'multi_checkbox': {
      const arr = Array.isArray(value) ? value : [];
      const opts = f.options.map(([v, lab]) => {
        const isOn = arr.includes(v);
        return `<label class="em-multi-opt ${isOn?'selected':''}"><input type="checkbox" value="${escapeHtml(v)}" ${isOn?'checked':''}>${escapeHtml(lab)}</label>`;
      }).join('');
      return `<div class="em-field">${lbl}<div class="em-multi" data-k="${f.k}" data-t="multi_checkbox">${opts}</div></div>`;
    }
    case 'soft_skills_rating': {
      const obj = (value && typeof value === 'object') ? value : {};
      const rows = SOFT_SKILL_FIELDS.map(([k, lab]) => {
        const v = parseInt(obj[k]) || 0;
        const stars = [0,1,2,3,4,5].map(n => `<span class="em-rating-star ${n===v?'active':''}" data-v="${n}">${n}</span>`).join('');
        return `<div class="em-field" style="margin-bottom:8px"><div class="em-field-label">${lab}</div><div class="em-rating" data-k="soft_skills.${k}" data-t="rating">${stars}</div></div>`;
      }).join('');
      return rows;
    }
    case 'language_levels': {
      const obj = (value && typeof value === 'object') ? value : {};
      return SPRACHEN_LIST.map(([code, name]) => {
        const lvl = obj[code] || '';
        const opts = SPRACH_LEVELS.map(L => `<span class="em-lang-level ${L===lvl?'selected':''}" data-v="${L}">${L||'—'}</span>`).join('');
        return `<div class="em-lang-row"><div class="em-lang-name">${name}</div><div class="em-lang-levels" data-k="sprachen.${code}" data-t="lang_level">${opts}</div></div>`;
      }).join('');
    }
    case 'availability_grid': {
      const verf = (value && typeof value === 'object') ? value : {};
      const tage = [['mo','Mo'],['di','Di'],['mi','Mi'],['do','Do'],['fr','Fr'],['sa','Sa'],['so','So']];
      return ['anbau','ausgabe','allgemein'].map(standort => {
        const slots = slotsFor(standort);
        const sv = verf[standort] || {};
        const headers = `<div class="em-verf-h"></div>` + slots.map(s =>
          `<div class="em-verf-h">${s.label}<small>${s.zeit}</small></div>`).join('');
        const rows = tage.map(([dk,dl]) => {
          const days = sv[dk] || [false,false,false,false,false];
          const cells = slots.map((s,i) =>
            `<div class="em-verf-cell ${days[i]?'on':''}" data-st="${standort}" data-day="${dk}" data-slot="${i}">${days[i]?'✓':'·'}</div>`
          ).join('');
          return `<div class="em-verf-d">${dl}</div>${cells}`;
        }).join('');
        return `<div class="em-verf-standort">
          <div class="em-verf-title">${standort.toUpperCase()}</div>
          <div class="em-verf-grid" data-k="verfuegbarkeit.${standort}" data-t="verf_grid">${headers}${rows}</div>
        </div>`;
      }).join('');
    }
    default: return '';
  }
}

// ----- Modal öffnen -----
function openEditModal(sectionKey) {
  if (!selectedId) return;
  const b = bewerbungen.find(x => x.id === selectedId);
  if (!b) return;
  const sec = EDIT_SECTIONS[sectionKey];
  if (!sec) return;

  currentEditSectionKey = sectionKey;
  currentEditBewerbung = b;

  document.getElementById('em-title').textContent = '✏ ' + sec.title;
  const body = document.getElementById('em-body');

  body.innerHTML = sec.groups.map(g => {
    const gt = g.title ? `<div class="em-section-title">${g.title}</div>` : '';
    // Felder, die in eine Row gehören, gruppieren
    let html = '';
    let lastRow = null;
    let rowBuffer = [];
    const flushRow = () => {
      if (!rowBuffer.length) return;
      if (rowBuffer.length === 1) html += rowBuffer[0];
      else html += `<div class="em-row${rowBuffer.length===3?'-3':''}">${rowBuffer.join('')}</div>`;
      rowBuffer = [];
    };
    g.fields.forEach(f => {
      const v = getNested(b, f.k);
      const rendered = renderEditField(f, v);
      if (f.row) {
        if (f.row === lastRow) {
          rowBuffer.push(rendered);
        } else {
          flushRow();
          rowBuffer = [rendered];
          lastRow = f.row;
        }
      } else {
        flushRow();
        lastRow = null;
        html += rendered;
      }
    });
    flushRow();
    return gt + html;
  }).join('');

  // Event-Handler nachträglich für Tri-State, Multi, Rating, Lang-Level, Verf-Grid
  attachEditHandlers(body);

  document.getElementById('em-overlay').classList.add('show');
  document.getElementById('em-audit-list')?.remove();
}

function attachEditHandlers(root) {
  // Tri-State Boolean
  root.querySelectorAll('.em-tri').forEach(tri => {
    tri.querySelectorAll('.em-tri-opt').forEach(opt => {
      opt.onclick = () => {
        tri.querySelectorAll('.em-tri-opt').forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
      };
    });
  });
  // Multi-Checkbox: change-event auf Checkbox direkt (kein onclick-Wrapper,
  // sonst Doppel-Toggle wegen <label>-implicit-click)
  root.querySelectorAll('.em-multi').forEach(m => {
    m.querySelectorAll('input[type="checkbox"]').forEach(cb => {
      const opt = cb.closest('.em-multi-opt');
      cb.addEventListener('change', () => {
        if (opt) opt.classList.toggle('selected', cb.checked);
      });
    });
  });
  // Rating
  root.querySelectorAll('.em-rating').forEach(r => {
    r.querySelectorAll('.em-rating-star').forEach(s => {
      s.onclick = () => {
        r.querySelectorAll('.em-rating-star').forEach(o => o.classList.remove('active'));
        s.classList.add('active');
      };
    });
  });
  // Language Levels
  root.querySelectorAll('.em-lang-levels').forEach(l => {
    l.querySelectorAll('.em-lang-level').forEach(s => {
      s.onclick = () => {
        l.querySelectorAll('.em-lang-level').forEach(o => o.classList.remove('selected'));
        s.classList.add('selected');
      };
    });
  });
  // Verfügbarkeitsraster
  root.querySelectorAll('.em-verf-cell').forEach(c => {
    c.onclick = () => {
      c.classList.toggle('on');
      c.textContent = c.classList.contains('on') ? '✓' : '·';
    };
  });
  // Datum-Maske
  root.querySelectorAll('input[data-t="date_de"]').forEach(inp => {
    inp.addEventListener('input', () => {
      const digits = inp.value.replace(/\D/g, '').slice(0, 8);
      let out = '';
      for (let i = 0; i < digits.length; i++) {
        if (i === 2 || i === 4) out += '.';
        out += digits[i];
      }
      if (out !== inp.value) inp.value = out;
    });
  });
}

function closeEditModal() {
  document.getElementById('em-overlay').classList.remove('show');
  currentEditSectionKey = null;
  currentEditBewerbung = null;
}

// ----- Save -----
async function saveEditModal() {
  if (!currentEditSectionKey || !currentEditBewerbung) return;
  const saveBtn = document.getElementById('em-save');
  saveBtn.disabled = true;
  saveBtn.textContent = 'Speichere…';

  const update = {};
  const b = currentEditBewerbung;

  // Erst alle nested-Roots vorinitialisieren mit existing values aus DB,
  // damit z.B. adresse.lat / adresse.lon nicht verloren gehen wenn wir
  // nur adresse.strasse ändern
  const nestedRoots = new Set();
  const body = document.getElementById('em-body');
  body.querySelectorAll('[data-k][data-t]').forEach(el => {
    if (el.dataset.k.includes('.')) {
      nestedRoots.add(el.dataset.k.split('.')[0]);
    }
  });
  nestedRoots.forEach(root => {
    const existing = b[root];
    if (existing && typeof existing === 'object' && !Array.isArray(existing)) {
      update[root] = { ...existing };
    } else {
      update[root] = {};
    }
  });

  // Sammle alle Inputs
  body.querySelectorAll('[data-k][data-t]').forEach(el => {
    const k = el.dataset.k;
    const t = el.dataset.t;
    let v;
    if (t === 'text' || t === 'email' || t === 'tel' || t === 'url') {
      v = el.value.trim() || null;
    } else if (t === 'number') {
      v = el.value.trim() === '' ? null : Number(el.value);
    } else if (t === 'textarea') {
      v = el.value.trim() || null;
    } else if (t === 'date_de') {
      const m = /^(\d{2})\.(\d{2})\.(\d{4})$/.exec(el.value.trim());
      v = m ? `${m[3]}-${m[2]}-${m[1]}` : null;
    } else if (t === 'select') {
      v = el.value === '' ? null : el.value;
    } else if (t === 'boolean_tri') {
      const sel = el.querySelector('.em-tri-opt.selected');
      const raw = sel ? sel.dataset.v : '';
      v = raw === 'true' ? true : raw === 'false' ? false : null;
    } else if (t === 'multi_checkbox') {
      v = Array.from(el.querySelectorAll('input[type="checkbox"]:checked')).map(c => c.value);
    } else if (t === 'rating') {
      const sel = el.querySelector('.em-rating-star.active');
      v = sel ? Number(sel.dataset.v) : 0;
    } else if (t === 'lang_level') {
      const sel = el.querySelector('.em-lang-level.selected');
      v = sel ? sel.dataset.v : '';
    } else if (t === 'verf_grid') {
      return; // wird unten gesondert behandelt
    } else {
      return;
    }
    setNested(update, k, v);
  });

  // Verfügbarkeitsraster gesondert: sammle alle Cells pro Standort
  const verfGrids = body.querySelectorAll('.em-verf-grid');
  if (verfGrids.length) {
    update.verfuegbarkeit = { ...(b.verfuegbarkeit || {}) };
    verfGrids.forEach(grid => {
      const standort = grid.dataset.k.split('.')[1];
      const days = { mo:[false,false,false,false,false], di:[false,false,false,false,false],
                     mi:[false,false,false,false,false], do:[false,false,false,false,false],
                     fr:[false,false,false,false,false], sa:[false,false,false,false,false],
                     so:[false,false,false,false,false] };
      grid.querySelectorAll('.em-verf-cell.on').forEach(c => {
        const d = c.dataset.day, s = parseInt(c.dataset.slot);
        if (days[d]) days[d][s] = true;
      });
      update.verfuegbarkeit[standort] = days;
    });
  }

  // Wenn nichts geändert: Modal schließen
  if (Object.keys(update).length === 0) {
    closeEditModal();
    return;
  }

  try {
    console.log('[Edit] Update-Payload:', update);
    const { data, error } = await sb
      .from('csc_bewerbungen')
      .update(update)
      .eq('id', b.id)
      .select();
    if (error) {
      console.error('[Edit] Supabase-Fehler:', error);
      throw error;
    }
    console.log('[Edit] Erfolg, neue Daten:', data);
    toast('✓ Änderungen gespeichert');
    closeEditModal();
    await loadDashboard();
    // Re-select to refresh detail view
    if (selectedId) selectBewerbung(selectedId);
  } catch (e) {
    const msg = e?.message || e?.details || e?.hint || String(e);
    console.error('[Edit] Save fehlgeschlagen:', e);
    toast('Fehler: ' + msg, true);
    alert('Fehler beim Speichern:\n\n' + msg + '\n\nDetails: ' + JSON.stringify(e, null, 2));
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = 'Speichern';
  }
}

// ----- Helper für Datums-Konvertierung -----
function toDeDate(iso) {
  if (!iso) return '';
  if (/^\d{2}\.\d{2}\.\d{4}$/.test(iso)) return iso;
  const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(iso);
  return m ? `${m[3]}.${m[2]}.${m[1]}` : '';
}

// ----- Audit-Log anzeigen -----
async function toggleAuditList() {
  if (!currentEditBewerbung) return;
  const existing = document.getElementById('em-audit-list');
  // Toggle: wenn schon offen, einfach schließen
  if (existing && existing.classList.contains('show')) {
    existing.remove();
    return;
  }
  // Sonst entfernen falls vorhanden, dann frisch laden
  if (existing) existing.remove();

  const list = document.createElement('div');
  list.id = 'em-audit-list';
  list.className = 'em-audit-list show';
  list.innerHTML = '<div style="color:var(--tx-mute)">Lade Änderungsverlauf…</div>';
  document.getElementById('em-body').appendChild(list);

  const { data, error } = await sb
    .from('csc_bewerbung_changes')
    .select('*')
    .eq('bewerbung_id', currentEditBewerbung.id)
    .order('changed_at', { ascending: false })
    .limit(50);

  if (error) {
    list.innerHTML = `<div style="color:var(--red)">Fehler: ${escapeHtml(error.message)}</div>`;
    console.error('[Audit] Fehler beim Laden:', error);
  } else if (!data || !data.length) {
    list.innerHTML = `<div style="color:var(--tx-mute)">Noch keine Änderungen erfasst.</div>`;
  } else {
    list.innerHTML = data.map(e => {
      const d = new Date(e.changed_at).toLocaleString('de-DE');
      const ov = e.old_value ?? '∅';
      const nv = e.new_value ?? '∅';
      const ovT = String(ov).slice(0, 80);
      const nvT = String(nv).slice(0, 80);
      return `<div class="em-audit-entry">
        <strong>${escapeHtml(e.field_name)}</strong>:
        <span style="color:var(--tx-mute)">${escapeHtml(ovT)}</span> →
        <span style="color:var(--green)">${escapeHtml(nvT)}</span>
        <div class="em-audit-meta">${escapeHtml(e.changed_by_name || '—')} · ${d}</div>
      </div>`;
    }).join('');
  }
}

// ESC schließt Edit-Modal
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('em-overlay')?.classList.contains('show')) {
    closeEditModal();
  }
});


document.addEventListener('DOMContentLoaded', () => {
  if (!SUPABASE_ANON_KEY || SUPABASE_ANON_KEY === 'BITTE_HIER_DEN_ANON_KEY_EINFUEGEN') {
    const msg = document.getElementById('login-msg');
    msg.textContent = 'Konfigurationsfehler: SUPABASE_ANON_KEY fehlt im Quelltext.';
    msg.className = 'login-msg error';
    msg.style.display = 'block';
    document.getElementById('login-btn').disabled = true;
    return;
  }
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: true }
  });
  init();
});
</script>

      <h2 id="em-title">Bearbeiten</h2>
