<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mariana Cannabis · Bewerbungs-Dashboard v2</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0a120d;
      --bg-card: #131e17;
      --bg-elev: #1a2920;
      --bg-elev2: #213227;
      --border: #2a3d31;
      --border-strong: #3d5644;
      --tx: #e8f0e9;
      --tx-dim: #9eb3a4;
      --tx-mute: #6a8170;
      --green: #4caf6a;
      --green-dim: #3a8a52;
      --green-glow: rgba(76, 175, 106, 0.18);
      --gold: #f9c74f;
      --gold-bg: rgba(249, 199, 79, 0.15);
      --red: #e57373;
      --red-bg: rgba(229, 115, 115, 0.12);
      --blue: #64b5f6;
      --blue-bg: rgba(100, 181, 246, 0.12);
      --orange: #ffb74d;
      --orange-bg: rgba(255, 183, 77, 0.12);
      --purple: #ba68c8;
      --purple-bg: rgba(186, 104, 200, 0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { font-family: 'DM Sans', system-ui, sans-serif; background: var(--bg); color: var(--tx); font-size: 15px; line-height: 1.55; min-height: 100vh; }
    code, .mono { font-family: 'DM Mono', monospace; }
    
    /* Login */
    #login { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; background: radial-gradient(ellipse at top, rgba(76, 175, 106, 0.08), transparent 60%), var(--bg); }
    .login-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5); }
    .login-card h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; margin-bottom: 4px; }
    .login-card .sub { color: var(--tx-dim); font-size: 13px; margin-bottom: 28px; }
    .brand-mark { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 24px; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--green); font-weight: 600; }
    .brand-mark::before { content: ''; width: 6px; height: 6px; background: var(--green); border-radius: 50%; box-shadow: 0 0 12px var(--green); }
    label { display: block; font-size: 12px; color: var(--tx-dim); margin-bottom: 6px; font-weight: 500; }
    input[type=email], input[type=text], select, textarea { width: 100%; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; padding: 11px 13px; color: var(--tx); font-family: inherit; font-size: 14px; transition: border-color 0.15s, background 0.15s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--green); background: #1d2e23; }
    button { cursor: pointer; font-family: inherit; border: none; transition: all 0.15s; }
    .btn-primary { background: var(--green); color: #0a120d; font-weight: 600; padding: 12px 18px; border-radius: 8px; width: 100%; font-size: 14px; margin-top: 16px; }
    .btn-primary:hover { background: #5fbe7d; transform: translateY(-1px); box-shadow: 0 6px 20px var(--green-glow); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    .login-msg { margin-top: 16px; padding: 12px 14px; border-radius: 8px; font-size: 13px; line-height: 1.5; }
    .login-msg.success { background: var(--green-glow); border: 1px solid var(--green-dim); color: #b8e4c0; }
    .login-msg.error { background: var(--red-bg); border: 1px solid var(--red); color: #f0bcbc; }
    
    /* App */
    #app { display: none; min-height: 100vh; }
    header { background: var(--bg-card); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; backdrop-filter: blur(20px); }
    .header-left { display: flex; align-items: center; gap: 16px; }
    .logo-text { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; }
    .logo-text .accent { color: var(--green); }
    .role-pill { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding: 4px 10px; border-radius: 999px; font-weight: 600; }
    .role-pill.admin { background: var(--green-glow); color: var(--green); border: 1px solid var(--green-dim); }
    .role-pill.vorstand { background: var(--blue-bg); color: var(--blue); border: 1px solid #4a90c2; }
    .header-right { display: flex; align-items: center; gap: 14px; font-size: 14px; }
    .user-email { color: var(--tx-dim); }
    .btn-ghost { background: transparent; color: var(--tx-dim); padding: 9px 16px; border-radius: 6px; font-size: 13px; border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--bg-elev); color: var(--tx); }
    
    /* Statistik */
    .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; padding: 18px 24px; background: var(--bg); border-bottom: 1px solid var(--border); }
    .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; cursor: pointer; transition: all 0.15s; }
    .stat-card:hover { border-color: var(--border-strong); transform: translateY(-1px); }
    .stat-card.active { border-color: var(--green); background: #1c2b22; }
    .stat-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--tx-mute); margin-bottom: 6px; font-weight: 600; }
    .stat-value { font-size: 26px; font-weight: 700; }
    .stat-sub { font-size: 12px; color: var(--tx-dim); margin-top: 2px; }
    .stat-icon { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
    .stat-icon.eingegangen { background: var(--blue); }
    .stat-icon.in_pruefung { background: var(--orange); }
    .stat-icon.eingeladen { background: var(--green); }
    .stat-icon.warteliste { background: var(--gold); }
    .stat-icon.angenommen { background: #5fbe7d; }
    .stat-icon.abgelehnt { background: var(--red); }
    .top-vereine-box { grid-column: 1 / -1; background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; }
    .top-vereine-box h3 { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--tx-mute); margin-bottom: 12px; font-weight: 600; }
    .top-vereine-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 8px; }
    .top-verein-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--bg-elev); border-radius: 6px; font-size: 14px; cursor: pointer; transition: background 0.1s; }
    .top-verein-item:hover { background: var(--bg-elev2); }
    .top-verein-name { font-weight: 500; }
    .top-verein-count { background: var(--green-glow); color: var(--green); padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    
    /* Main Layout */
    .main { display: grid; grid-template-columns: 420px 1fr; height: calc(100vh - 56px - 140px); }
    @media (max-width: 900px) { .main { grid-template-columns: 1fr; } }
    
    /* Liste */
    .list-panel { border-right: 1px solid var(--border); background: var(--bg-card); overflow: hidden; display: flex; flex-direction: column; }
    .list-header { padding: 14px 16px; border-bottom: 1px solid var(--border); background: var(--bg-card); }
    .list-title { font-size: 16px; font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    .list-title .count { font-size: 11px; background: var(--bg-elev); padding: 3px 8px; border-radius: 999px; color: var(--tx-dim); font-weight: 500; }
    .filter-row { display: flex; gap: 6px; margin-bottom: 6px; }
    .filter-row select, .filter-row input { padding: 9px 11px; font-size: 13px; flex: 1; }
    .list-items { flex: 1; overflow-y: auto; }
    .list-item { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.1s; }
    .list-item:hover { background: var(--bg-elev); }
    .list-item.active { background: var(--bg-elev); border-left: 3px solid var(--green); padding-left: 13px; }
    .list-item-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 4px; }
    .list-item-name { font-weight: 600; font-size: 15px; }
    .list-item-date { font-size: 12px; color: var(--tx-mute); font-family: 'DM Mono', monospace; }
    .list-item-meta { font-size: 13px; color: var(--tx-dim); display: flex; gap: 8px; align-items: center; margin-top: 4px; flex-wrap: wrap; }
    .list-item-rolle { color: var(--green); font-weight: 500; }
    .list-item-verein { font-size: 11px; color: var(--tx-mute); margin-top: 4px; }
    .list-empty { padding: 40px 24px; text-align: center; color: var(--tx-mute); font-size: 13px; }
    
    /* Status Badges */
    .status-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 2px 8px; border-radius: 999px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .status-badge.eingegangen { background: var(--blue-bg); color: var(--blue); }
    .status-badge.in_pruefung { background: var(--orange-bg); color: var(--orange); }
    .status-badge.eingeladen { background: var(--green-glow); color: var(--green); }
    .status-badge.warteliste { background: var(--gold-bg); color: var(--gold); }
    .status-badge.abgelehnt { background: var(--red-bg); color: var(--red); }
    .status-badge.angenommen { background: var(--green); color: var(--bg); }
    
    /* Detail */
    .detail-panel { overflow-y: auto; padding: 28px 36px; background: var(--bg); }
    @media (max-width: 1100px) { .detail-panel { padding: 20px 24px; } }
    .detail-empty { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--tx-mute); font-size: 14px; text-align: center; }
    .detail-header { display: flex; align-items: flex-start; justify-content: space-between; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 24px; gap: 24px; flex-wrap: wrap; }
    .detail-name { font-size: 26px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 4px; }
    .detail-meta { color: var(--tx-dim); font-size: 13px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .detail-meta a { color: var(--blue); text-decoration: none; }
    .detail-meta a:hover { text-decoration: underline; }
    .detail-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .action-btn { padding: 8px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; border: 1px solid; background: transparent; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.03em; }
    .action-btn.einladen { border-color: var(--green-dim); color: var(--green); }
    .action-btn.einladen:hover { background: var(--green-glow); }
    .action-btn.warteliste { border-color: #c89d3a; color: var(--gold); }
    .action-btn.warteliste:hover { background: var(--gold-bg); }
    .action-btn.abgelehnt { border-color: #b85959; color: var(--red); }
    .action-btn.abgelehnt:hover { background: var(--red-bg); }
    .action-btn.angenommen { background: var(--green); color: var(--bg); border-color: var(--green); }
    .action-btn.angenommen:hover { background: #5fbe7d; }
    .action-btn.pruefen { border-color: #b88c4d; color: var(--orange); }
    .action-btn.pruefen:hover { background: var(--orange-bg); }
    
    /* Sektionen */
    .section { margin-bottom: 24px; }
    .section-title { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--tx-mute); margin-bottom: 10px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .field-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px 20px; }
    .field { display: flex; flex-direction: column; gap: 2px; }
    .field-label { font-size: 11px; color: var(--tx-mute); text-transform: uppercase; letter-spacing: 0.05em; }
    .field-value { font-size: 14px; color: var(--tx); word-break: break-word; }
    .field-value.empty { color: var(--tx-mute); font-style: italic; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 4px; }
    .tag { font-size: 12px; padding: 3px 9px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 999px; color: var(--tx); }
    .tag.role { background: var(--green-glow); border-color: var(--green-dim); color: var(--green); }
    .tag.skill { background: var(--purple-bg); border-color: #884ea0; color: #d8a4e0; }
    
    /* Verfügbarkeits-Raster */
    .verfuegbar-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    .verfuegbar-title { font-size: 12px; font-weight: 600; color: var(--tx-dim); margin-bottom: 8px; }
    .verfuegbar-grid { display: grid; grid-template-columns: 60px repeat(4, 1fr); gap: 4px; font-size: 11px; }
    .vg-corner, .vg-day, .vg-slot-label { padding: 5px 6px; color: var(--tx-mute); font-weight: 600; text-align: center; text-transform: uppercase; font-size: 11px; letter-spacing: 0.05em; }
    .vg-day { text-align: left; padding-left: 8px; color: var(--tx); font-weight: 500; }
    .vg-cell { padding: 7px 4px; background: var(--bg-elev); border-radius: 4px; text-align: center; font-size: 13px; color: var(--tx-mute); font-weight: 600; }
    .vg-cell.active { background: var(--green); color: var(--bg); }
    
    /* Soft-Skills */
    .skill-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .skill-bar-label { width: 160px; font-size: 13px; color: var(--tx-dim); }
    .skill-bar-track { flex: 1; height: 6px; background: var(--bg-elev); border-radius: 3px; overflow: hidden; }
    .skill-bar-fill { height: 100%; background: linear-gradient(90deg, var(--green-dim), var(--green)); border-radius: 3px; }
    .skill-bar-val { width: 36px; font-size: 12px; color: var(--green); text-align: right; font-family: 'DM Mono', monospace; }
    
    /* Anhänge */
    .anhang-list { display: flex; flex-direction: column; gap: 8px; }
    .anhang-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; font-size: 13px; }
    .anhang-item .name { color: var(--tx); font-weight: 500; }
    .anhang-item .meta { color: var(--tx-mute); font-size: 12px; font-family: 'DM Mono', monospace; }
    .anhang-link { color: var(--green); text-decoration: none; font-size: 13px; font-weight: 600; padding: 6px 12px; border: 1px solid var(--green-dim); border-radius: 6px; background: transparent; }
    .anhang-link:hover { background: var(--green-glow); }
    
    /* Notiz-Bereich */
    .notiz-section { background: var(--bg-card); border: 1px solid var(--border-strong); border-radius: 8px; padding: 14px 16px; margin-bottom: 24px; }
    .notiz-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .notiz-header-title { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); font-weight: 600; }
    .notiz-header-meta { font-size: 10px; color: var(--tx-mute); font-family: 'DM Mono', monospace; }
    .notiz-textarea { width: 100%; min-height: 90px; background: var(--bg-elev); border: 1px solid var(--border); border-radius: 6px; padding: 12px 14px; color: var(--tx); font-family: inherit; font-size: 14px; line-height: 1.5; resize: vertical; }
    .notiz-textarea:focus { outline: none; border-color: var(--gold); }
    .notiz-save-hint { font-size: 11px; color: var(--tx-mute); margin-top: 6px; }
    .notiz-save-hint.saved { color: var(--green); }
    
    /* Loading & Toast */
    .loading { display: flex; align-items: center; gap: 8px; color: var(--tx-mute); font-size: 13px; padding: 24px; }
    .loading::before { content: ''; width: 12px; height: 12px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg-card); border: 1px solid var(--green-dim); color: var(--tx); padding: 14px 20px; border-radius: 10px; font-size: 13px; z-index: 100; box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5); transform: translateY(100px); opacity: 0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.error { border-color: var(--red); }
  </style>
</head>
<body>

<div id="login">
  <div class="login-card">
    <div class="brand-mark">Mariana Cannabis</div>
    <h1>Bewerbungs-Dashboard</h1>
    <p class="sub">Login per Magic-Link. Du bekommst eine E-Mail mit einem Login-Link.</p>
    <label for="login-email">E-Mail-Adresse</label>
    <input type="email" id="login-email" placeholder="vorstand@mariana-cannabis.de" autocomplete="email">
    <button class="btn-primary" id="login-btn" onclick="sendMagicLink()">Login-Link senden</button>
    <div id="login-msg" class="login-msg" style="display:none"></div>
  </div>
</div>

<div id="app">
  <header>
    <div class="header-left">
      <div class="logo-text">Mariana <span class="accent">·</span> Bewerbungen</div>
      <span class="role-pill" id="role-pill"></span>
    </div>
    <div class="header-right">
      <span class="user-email" id="user-email"></span>
      <button class="btn-ghost" onclick="exportCsv()" title="Aktuell sichtbare Bewerbungen als CSV/Excel exportieren">⬇ Export</button>
      <button class="btn-ghost" onclick="logout()">Abmelden</button>
    </div>
  </header>
  
  <div class="stats-bar" id="stats-bar"></div>
  
  <div class="main">
    <div class="list-panel">
      <div class="list-header">
        <div class="list-title">Bewerbungen <span class="count" id="list-count">–</span></div>
        <div class="filter-row">
          <select id="filter-status" onchange="renderList()">
            <option value="">Alle Status</option>
            <option value="eingegangen">Eingegangen</option>
            <option value="in_pruefung">In Prüfung</option>
            <option value="eingeladen">Eingeladen</option>
            <option value="warteliste">Warteliste</option>
            <option value="angenommen">Angenommen</option>
            <option value="abgelehnt">Abgelehnt</option>
          </select>
          <select id="filter-verein" onchange="renderList()" style="display:none">
            <option value="">Alle Vereine</option>
          </select>
        </div>
        <div class="filter-row">
          <input type="text" id="filter-search" placeholder="Name, E-Mail oder Stadt..." oninput="renderList()">
        </div>
        <div class="filter-row">
          <select id="sort-by" onchange="renderList()">
            <option value="date_desc">Neueste zuerst</option>
            <option value="date_asc">Älteste zuerst</option>
            <option value="status">Nach Status</option>
            <option value="verein">Nach Verein A-Z</option>
            <option value="bundesland">Nach Bundesland</option>
            <option value="name">Nach Name A-Z</option>
          </select>
        </div>
      </div>
      <div class="list-items" id="list-items">
        <div class="loading">Lade Bewerbungen...</div>
      </div>
    </div>
    
    <div class="detail-panel" id="detail-panel">
      <div class="detail-empty">
        <div>Wähle links eine Bewerbung aus,<br>um Details zu sehen.</div>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

const SPRACH_LEVEL = { '': '–', 'a1': 'A1', 'a2': 'A2', 'b1': 'B1', 'b2': 'B2', 'c1': 'C1', 'c2': 'C2', 'native': 'Muttersprache' };
const WOCHENTAGE = [{ key: 'mo', label: 'Mo' }, { key: 'di', label: 'Di' }, { key: 'mi', label: 'Mi' }, { key: 'do', label: 'Do' }, { key: 'fr', label: 'Fr' }, { key: 'sa', label: 'Sa' }, { key: 'so', label: 'So' }];
const ZEITSLOTS = ['Morgens', 'Mittags', 'Nachmittags', 'Abends'];

let sb = null, session = null, userContext = null, bewerbungen = [], vereine = {}, selectedId = null, activeStatusFilter = '';

async function init() {
  const { data: { session: existingSession } } = await sb.auth.getSession();
  if (existingSession) { session = existingSession; await loadDashboard(); }
  else showLogin();
  
  sb.auth.onAuthStateChange(async (event, newSession) => {
    if (event === 'SIGNED_IN' && newSession) { session = newSession; await loadDashboard(); }
    else if (event === 'SIGNED_OUT') { session = null; showLogin(); }
  });
}

function showLogin() { document.getElementById('login').style.display = 'flex'; document.getElementById('app').style.display = 'none'; }
function showApp() { document.getElementById('login').style.display = 'none'; document.getElementById('app').style.display = 'block'; }

async function sendMagicLink() {
  const email = document.getElementById('login-email').value.trim().toLowerCase();
  const btn = document.getElementById('login-btn');
  if (!email || !email.includes('@')) { showLoginMsg('Bitte eine gültige E-Mail-Adresse eingeben.', 'error'); return; }
  btn.disabled = true; btn.textContent = 'Sende Login-Link...';
  document.getElementById('login-msg').style.display = 'none';
  try {
    const { error } = await sb.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.href.split('#')[0].split('?')[0], shouldCreateUser: true }
    });
    if (error) showLoginMsg('Fehler: ' + error.message, 'error');
    else { showLoginMsg('Login-Link wurde an ' + email + ' geschickt. Bitte E-Mail-Postfach prüfen (auch Spam).', 'success'); btn.textContent = 'E-Mail geschickt ✓'; }
  } catch (e) { showLoginMsg('Netzwerk-Fehler: ' + e.message, 'error'); }
  finally { setTimeout(() => { btn.disabled = false; if (btn.textContent === 'Sende Login-Link...') btn.textContent = 'Login-Link senden'; }, 2000); }
}

function showLoginMsg(text, type) {
  const msgEl = document.getElementById('login-msg');
  msgEl.textContent = text; msgEl.className = 'login-msg ' + type; msgEl.style.display = 'block';
}

async function logout() { await sb.auth.signOut(); }

async function loadDashboard() {
  showApp();
  try {
    const { data: userData, error: userErr } = await sb.rpc('csc_current_user_context');
    if (userErr) throw userErr;
    if (!userData || userData.length === 0) {
      document.getElementById('list-items').innerHTML = '<div class="list-empty">Dein Account ist nicht für das Dashboard freigeschaltet.<br><br>Bitte wende dich an den Mariana-Hauptverein.</div>';
      document.getElementById('user-email').textContent = session.user.email;
      document.getElementById('role-pill').textContent = 'Kein Zugriff';
      document.getElementById('role-pill').className = 'role-pill';
      document.getElementById('stats-bar').style.display = 'none';
      return;
    }
    userContext = userData[0]; userContext.email = session.user.email;
    await sb.from('csc_dashboard_user').update({ letzter_login: new Date().toISOString() }).eq('auth_user_id', session.user.id);
  } catch (e) { toast('Fehler beim Laden des User-Kontexts: ' + e.message, true); return; }
  
  document.getElementById('user-email').textContent = userContext.email;
  const pill = document.getElementById('role-pill');
  if (userContext.ist_admin) { pill.textContent = 'Admin · Alle Vereine'; pill.className = 'role-pill admin'; document.getElementById('filter-verein').style.display = ''; }
  else { pill.textContent = 'Vorstand'; pill.className = 'role-pill vorstand'; }
  
  await loadVereine();
  await loadBewerbungen();
  renderStats();
}

async function loadVereine() {
  const { data, error } = await sb.from('csc_vereine').select('id, name, ort, plz, bundesland').eq('aktiv', true);
  if (error) { console.error('Vereine:', error); return; }
  vereine = {}; data.forEach(v => { vereine[v.id] = v; });
  if (userContext.ist_admin) {
    const sel = document.getElementById('filter-verein');
    sel.innerHTML = '<option value="">Alle Vereine</option>' + data.sort((a,b) => a.name.localeCompare(b.name, 'de')).map(v => `<option value="${v.id}">${escapeHtml(v.name)}</option>`).join('');
  }
}

async function loadBewerbungen() {
  const { data, error } = await sb.from('csc_bewerbungen').select('*').order('eingegangen_am', { ascending: false });
  if (error) { document.getElementById('list-items').innerHTML = '<div class="list-empty">Fehler beim Laden: ' + escapeHtml(error.message) + '</div>'; return; }
  bewerbungen = data || [];
  renderList();
}

function renderStats() {
  const bar = document.getElementById('stats-bar');
  const counts = {};
  Object.keys(STATUS_LABELS).forEach(s => counts[s] = 0);
  bewerbungen.forEach(b => { const s = b.status || 'eingegangen'; counts[s] = (counts[s] || 0) + 1; });
  const total = bewerbungen.length;
  const heute = new Date().toISOString().slice(0, 10);
  const heuteCount = bewerbungen.filter(b => b.eingegangen_am && b.eingegangen_am.startsWith(heute)).length;
  
  const cards = [
    { key: '', label: 'Gesamt', value: total, sub: heuteCount > 0 ? `+${heuteCount} heute` : '', icon: null },
    { key: 'eingegangen', label: 'Eingegangen', value: counts.eingegangen, sub: 'noch nicht geprüft', icon: 'eingegangen' },
    { key: 'in_pruefung', label: 'In Prüfung', value: counts.in_pruefung, sub: 'bei Vorstand', icon: 'in_pruefung' },
    { key: 'eingeladen', label: 'Eingeladen', value: counts.eingeladen, sub: 'Gespräch geplant', icon: 'eingeladen' },
    { key: 'warteliste', label: 'Warteliste', value: counts.warteliste, sub: 'für Reserve-Pool', icon: 'warteliste' },
    { key: 'angenommen', label: 'Angenommen', value: counts.angenommen, sub: 'aktiv im Verein', icon: 'angenommen' },
  ];
  
  let html = cards.map(c => `
    <div class="stat-card ${activeStatusFilter === c.key ? 'active' : ''}" onclick="setStatusFilter('${c.key}')">
      <div class="stat-label">${c.icon ? `<span class="stat-icon ${c.icon}"></span>` : ''}${c.label}</div>
      <div class="stat-value">${c.value}</div>
      ${c.sub ? `<div class="stat-sub">${c.sub}</div>` : ''}
    </div>
  `).join('');
  
  if (userContext.ist_admin && total > 0) {
    const vereinCounts = {};
    bewerbungen.forEach(b => { vereinCounts[b.verein_id] = (vereinCounts[b.verein_id] || 0) + 1; });
    const topVereine = Object.entries(vereinCounts)
      .map(([id, count]) => ({ id, name: vereine[id]?.name || 'Unbekannt', count }))
      .sort((a, b) => b.count - a.count).slice(0, 5);
    if (topVereine.length > 0) {
      html += `<div class="top-vereine-box"><h3>Top Vereine (nach Bewerbungs-Anzahl)</h3><div class="top-vereine-list">${topVereine.map(v => `<div class="top-verein-item" onclick="filterByVerein('${v.id}')"><span class="top-verein-name">${escapeHtml(v.name)}</span><span class="top-verein-count">${v.count}</span></div>`).join('')}</div></div>`;
    }
  }
  bar.innerHTML = html;
}

function setStatusFilter(status) {
  activeStatusFilter = activeStatusFilter === status ? '' : status;
  document.getElementById('filter-status').value = activeStatusFilter;
  renderStats(); renderList();
}

function filterByVerein(vereinId) { document.getElementById('filter-verein').value = vereinId; renderList(); }

function renderList() {
  const statusFilter = document.getElementById('filter-status').value;
  const vereinFilter = document.getElementById('filter-verein').value;
  const searchTerm = document.getElementById('filter-search').value.toLowerCase().trim();
  const sortBy = document.getElementById('sort-by').value;
  activeStatusFilter = statusFilter;
  
  let filtered = bewerbungen;
  if (statusFilter) filtered = filtered.filter(b => (b.status || 'eingegangen') === statusFilter);
  if (vereinFilter) filtered = filtered.filter(b => b.verein_id === vereinFilter);
  if (searchTerm) {
    filtered = filtered.filter(b => {
      const hay = [b.vorname, b.nachname, b.email, b.adresse?.ort, b.adresse?.plz, b.adresse?.stadt, vereine[b.verein_id]?.name].filter(Boolean).join(' ').toLowerCase();
      return hay.includes(searchTerm);
    });
  }
  
  const statusOrder = ['eingegangen', 'in_pruefung', 'eingeladen', 'warteliste', 'angenommen', 'abgelehnt'];
  filtered.sort((a, b) => {
    switch (sortBy) {
      case 'date_asc': return new Date(a.eingegangen_am || 0) - new Date(b.eingegangen_am || 0);
      case 'date_desc': return new Date(b.eingegangen_am || 0) - new Date(a.eingegangen_am || 0);
      case 'status': { const sA = statusOrder.indexOf(a.status || 'eingegangen'); const sB = statusOrder.indexOf(b.status || 'eingegangen'); if (sA !== sB) return sA - sB; return new Date(b.eingegangen_am || 0) - new Date(a.eingegangen_am || 0); }
      case 'verein': return (vereine[a.verein_id]?.name || '').localeCompare(vereine[b.verein_id]?.name || '', 'de');
      case 'bundesland': { const bA = vereine[a.verein_id]?.bundesland || ''; const bB = vereine[b.verein_id]?.bundesland || ''; if (bA !== bB) return bA.localeCompare(bB, 'de'); return (vereine[a.verein_id]?.name || '').localeCompare(vereine[b.verein_id]?.name || '', 'de'); }
      case 'name': return ((a.nachname || '') + ' ' + (a.vorname || '')).localeCompare((b.nachname || '') + ' ' + (b.vorname || ''), 'de');
      default: return 0;
    }
  });
  
  document.getElementById('list-count').textContent = filtered.length;
  const container = document.getElementById('list-items');
  if (filtered.length === 0) { container.innerHTML = '<div class="list-empty">Keine Bewerbungen gefunden.</div>'; return; }
  
  container.innerHTML = filtered.map(b => {
    const v = vereine[b.verein_id];
    const status = b.status || 'eingegangen';
    const rollen = Array.isArray(b.rollen) ? b.rollen : [];
    const rollenLabel = rollen.slice(0, 2).map(r => ROLE_LABELS[r] || r).join(', ') + (rollen.length > 2 ? ` +${rollen.length - 2}` : '');
    const date = b.eingegangen_am ? new Date(b.eingegangen_am).toLocaleDateString('de-DE', {day:'2-digit',month:'2-digit'}) : '–';
    return `<div class="list-item ${b.id === selectedId ? 'active' : ''}" onclick="selectBewerbung('${b.id}')"><div class="list-item-top"><div class="list-item-name">${escapeHtml(b.vorname || '')} ${escapeHtml(b.nachname || '')}</div><div class="list-item-date">${date}</div></div><div class="list-item-meta"><span class="status-badge ${status}">${STATUS_LABELS[status] || status}</span><span class="list-item-rolle">${escapeHtml(rollenLabel || '–')}</span></div>${userContext.ist_admin && v ? `<div class="list-item-verein">${escapeHtml(v.name)}</div>` : ''}</div>`;
  }).join('');
}

async function selectBewerbung(id) {
  selectedId = id; renderList();
  const b = bewerbungen.find(x => x.id === id);
  if (!b) return;
  const v = vereine[b.verein_id];
  const status = b.status || 'eingegangen';
  
  let anhaenge = [];
  try { const { data: ah } = await sb.from('csc_bewerbung_anhaenge').select('*').eq('bewerbung_id', id); anhaenge = ah || []; }
  catch (e) { console.error('Anhänge:', e); }
  
  const fmt = (val) => val ? escapeHtml(String(val)) : '<span class="empty">–</span>';
  const fmtDate = (val) => val ? new Date(val).toLocaleDateString('de-DE') : '<span class="empty">–</span>';
  const fmtBool = (val) => val === true ? 'Ja' : val === false ? 'Nein' : '<span class="empty">–</span>';
  const fmtList = (arr) => Array.isArray(arr) && arr.length ? arr.map(x => `<span class="tag">${escapeHtml(ROLE_LABELS[x] || x)}</span>`).join('') : '<span class="empty">–</span>';
  const fmtRoles = (arr) => Array.isArray(arr) && arr.length ? arr.map(x => `<span class="tag role">${escapeHtml(ROLE_LABELS[x] || x)}</span>`).join('') : '<span class="empty">–</span>';
  
  const anfahrtAusgabe = b.max_anfahrt ? (ANFAHRT_LABELS_AUSGABE[String(b.max_anfahrt)] || b.max_anfahrt + ' min') : null;
  const anfahrtAnbau = b.max_anfahrt_anbau ? (ANFAHRT_LABELS_ANBAU[String(b.max_anfahrt_anbau)] || b.max_anfahrt_anbau + ' km') : null;
  
  const adresse = b.adresse || {};
  const adresseStr = [adresse.strasse, [adresse.plz, adresse.ort || adresse.stadt].filter(Boolean).join(' ')].filter(Boolean).join(', ') || '–';
  
  function buildVerfuegbarkeitGrid(standort, label) {
    const verf = b.verfuegbarkeit && b.verfuegbarkeit[standort];
    if (!verf) return '';
    let hasAny = false;
    WOCHENTAGE.forEach(d => { if (verf[d.key] && verf[d.key].some(x => x)) hasAny = true; });
    if (!hasAny) return '';
    return `<div class="verfuegbar-section"><div class="verfuegbar-title">${label}</div><div class="verfuegbar-grid"><div class="vg-corner"></div>${ZEITSLOTS.map(s => `<div class="vg-slot-label">${s}</div>`).join('')}${WOCHENTAGE.map(d => `<div class="vg-day">${d.label}</div>${[0,1,2,3].map(i => `<div class="vg-cell ${verf[d.key]?.[i] ? 'active' : ''}">${verf[d.key]?.[i] ? '✓' : '·'}</div>`).join('')}`).join('')}</div></div>`;
  }
  
  let verfHtml = '';
  verfHtml += buildVerfuegbarkeitGrid('anbau', 'Anbauanlage');
  verfHtml += buildVerfuegbarkeitGrid('ausgabe', 'Ausgabe');
  verfHtml += buildVerfuegbarkeitGrid('allgemein', 'Allgemein');
  
  const sprachenList = b.sprachen ? Object.entries(b.sprachen).filter(([k, v]) => v && v !== '').map(([k, v]) => `<span class="tag">${SPRACHEN_LABELS[k] || k}: ${SPRACH_LEVEL[v] || v}</span>`).join('') : '';
  
  let softSkillsHtml = '';
  if (b.soft_skills && typeof b.soft_skills === 'object') {
    const skills = Object.entries(b.soft_skills).filter(([k,v]) => v > 0);
    if (skills.length > 0) {
      softSkillsHtml = skills.map(([k, v]) => `<div class="skill-bar"><div class="skill-bar-label">${SOFT_SKILL_LABELS[k] || k}</div><div class="skill-bar-track"><div class="skill-bar-fill" style="width:${Math.min(100, v*20)}%"></div></div><div class="skill-bar-val">${v}/5</div></div>`).join('');
    }
  }
  
  const html = `
    <div class="detail-header">
      <div>
        <div class="detail-name">${escapeHtml(b.vorname || '')} ${escapeHtml(b.nachname || '')}</div>
        <div class="detail-meta">
          <span class="status-badge ${status}">${STATUS_LABELS[status] || status}</span>
          <span class="mono">ID: ${b.id.slice(0, 8).toUpperCase()}</span>
          <span>· ${fmtDate(b.eingegangen_am)}</span>
          ${v ? `<span>· <strong style="color:var(--tx)">${escapeHtml(v.name)}</strong></span>` : ''}
        </div>
      </div>
      <div class="detail-actions">
        <button class="action-btn pruefen" onclick="setStatus('${b.id}', 'in_pruefung')">In Prüfung</button>
        <button class="action-btn einladen" onclick="setStatus('${b.id}', 'eingeladen')">Einladen</button>
        <button class="action-btn warteliste" onclick="setStatus('${b.id}', 'warteliste')">Warteliste</button>
        <button class="action-btn angenommen" onclick="setStatus('${b.id}', 'angenommen')">Annehmen</button>
        <button class="action-btn abgelehnt" onclick="setStatus('${b.id}', 'abgelehnt')">Ablehnen</button>
      </div>
    </div>
    
    <div class="notiz-section">
      <div class="notiz-header">
        <div class="notiz-header-title">📝 Interne Notiz</div>
        <div class="notiz-header-meta" id="notiz-meta">${b.notiz_geaendert_am ? 'zuletzt: ' + new Date(b.notiz_geaendert_am).toLocaleString('de-DE', {day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}) + (b.notiz_geaendert_von ? ' · ' + escapeHtml(b.notiz_geaendert_von) : '') : 'noch keine Notiz'}</div>
      </div>
      <textarea class="notiz-textarea" id="notiz-textarea" 
        placeholder="Hier interne Notizen eintragen (nur für Vorstand sichtbar)..."
        onblur="saveNotiz('${b.id}')">${escapeHtml(b.vorstand_notiz || '')}</textarea>
      <div class="notiz-save-hint" id="notiz-save-hint">Speichert automatisch beim Verlassen des Felds</div>
    </div>
    
    <div class="section">
      <div class="section-title">Kontakt &amp; Person</div>
      <div class="field-grid">
        <div class="field"><div class="field-label">E-Mail</div><div class="field-value"><a href="mailto:${escapeHtml(b.email || '')}" style="color:var(--blue);text-decoration:none">${fmt(b.email)}</a></div></div>
        <div class="field"><div class="field-label">Telefon</div><div class="field-value"><a href="tel:${escapeHtml(b.telefon || '')}" style="color:var(--blue);text-decoration:none">${fmt(b.telefon)}</a></div></div>
        <div class="field"><div class="field-label">Geburtsdatum</div><div class="field-value">${fmtDate(b.geburtsdatum)}</div></div>
        <div class="field"><div class="field-label">Geburtsort</div><div class="field-value">${fmt(b.geburtsort)}</div></div>
        <div class="field"><div class="field-label">Staatsangehörigkeit</div><div class="field-value">${fmt(b.staatsangehoerigkeit)}</div></div>

        <div class="field"><div class="field-label">Volljährig</div><div class="field-value">${fmtBool(b.ist_volljaehrig)}</div></div>
        <div class="field"><div class="field-label">Nicht-EU-Bürger</div><div class="field-value">${fmtBool(b.ist_nicht_eu)}</div></div>

        <div class="field"><div class="field-label">CSC-Mitglied</div><div class="field-value">${fmt(b.ist_mitglied)}</div></div>
        <div class="field"><div class="field-label">Sprache des Bogens</div><div class="field-value">${(b.sprache || 'de').toUpperCase()}</div></div>
      </div>
    </div>
    
    <div class="section">
      <div class="section-title">Bewerbung &amp; Rolle</div>
      <div class="field"><div class="field-label">Rolle(n)</div><div class="tag-list">${fmtRoles(b.rollen)}</div></div>
      <div class="field" style="margin-top:12px"><div class="field-label">Anstellungsform(en)</div><div class="tag-list">${fmtList(b.anstellungsformen)}</div></div>
      ${Array.isArray(b.rollen_standorte) && b.rollen_standorte.length ? `<div class="field" style="margin-top:12px"><div class="field-label">Rollen-Standorte</div><div class="tag-list">${b.rollen_standorte.map(s => `<span class="tag">${escapeHtml(s)}</span>`).join('')}</div></div>` : ''}
      ${b.standort_konflikt ? `<div class="field" style="margin-top:12px"><div class="field-label" style="color:var(--orange)">⚠ Standort-Konflikt</div><div class="field-value">Bewerber hat Rollen aus Anbau UND Ausgabe gewählt — Konflikt: ${fmtBool(b.standort_konflikt)}, bestätigt: ${fmtBool(b.bestaetigt_zwei_standorte)}</div></div>` : ''}
      ${b.motivation ? `<div class="field" style="margin-top:12px"><div class="field-label">Motivation</div><div class="field-value" style="white-space:pre-wrap;background:var(--bg-card);padding:12px;border-radius:6px;border:1px solid var(--border);margin-top:4px">${escapeHtml(b.motivation)}</div></div>` : ''}
    </div>
    
    <div class="section">
      <div class="section-title">Verfügbarkeit</div>
      <div class="field-grid" style="margin-bottom:14px">
        <div class="field"><div class="field-label">Wunsch-Stunden / Woche</div><div class="field-value">${b.wunsch_stunden_min || '?'}–${b.wunsch_stunden_max || '?'} Std.</div></div>
        <div class="field"><div class="field-label">Frühester Einstieg</div><div class="field-value">${fmtDate(b.eintritt_fruehestens)}</div></div>
        <div class="field"><div class="field-label">Kündigungsfrist</div><div class="field-value">${fmt(b.kuendigungsfrist)}</div></div>
        ${anfahrtAusgabe ? `<div class="field"><div class="field-label">Max. Anfahrt Ausgabe</div><div class="field-value">${escapeHtml(anfahrtAusgabe)}</div></div>` : ''}
        ${anfahrtAnbau ? `<div class="field"><div class="field-label">Max. Anfahrt Anbau</div><div class="field-value">${escapeHtml(anfahrtAnbau)}</div></div>` : ''}
        <div class="field"><div class="field-label">Wochenende möglich</div><div class="field-value">${fmtBool(b.bereit_we)}</div></div>
        <div class="field"><div class="field-label">Feiertag möglich</div><div class="field-value">${fmtBool(b.bereit_feiertag)}</div></div>
        <div class="field"><div class="field-label">Nacht möglich</div><div class="field-value">${fmtBool(b.bereit_nacht)}</div></div>
        <div class="field"><div class="field-label">Jobticket gewünscht</div><div class="field-value">${fmt(b.jobticket)}</div></div>
        <div class="field"><div class="field-label">Eigenes Fahrzeug</div><div class="field-value">${fmtBool(b.eigenes_fahrzeug)}</div></div>
        <div class="field"><div class="field-label">Führerschein</div><div class="field-value">${Array.isArray(b.fuehrerschein) && b.fuehrerschein.length ? b.fuehrerschein.map(f => `<span class="tag">${escapeHtml(f)}</span>`).join(' ') : fmtBool(b.fuehrerschein)}</div></div>
      </div>
      ${b.sperrzeiten ? `<div class="field"><div class="field-label">Sperrzeiten</div><div class="field-value">${fmt(b.sperrzeiten)}</div></div>` : ''}
      ${b.wunsch_zeiten ? `<div class="field" style="margin-top:8px"><div class="field-label">Wunsch-Zeiten (Notiz)</div><div class="field-value">${fmt(b.wunsch_zeiten)}</div></div>` : ''}
      ${verfHtml ? `<div style="margin-top:14px">${verfHtml}</div>` : ''}

        ${b.status_geaendert_am ? `<div class="field"><div class="field-label">Status zuletzt geändert</div><div class="field-value">${new Date(b.status_geaendert_am).toLocaleString('de-DE')}${b.status_geaendert_von ? ' · ' + escapeHtml(b.status_geaendert_von) : ''}</div></div>` : ''}

async function setStatus(id, newStatus) {
  const b = bewerbungen.find(x => x.id === id);
  if (!b) return;
  const confirmed = confirm(`Status auf "${STATUS_LABELS[newStatus]}" setzen?\n\n${b.vorname} ${b.nachname}`);
  if (!confirmed) return;
  try {
    // status_geaendert_am und status_geaendert_von werden via Trigger automatisch gesetzt
    const { error } = await sb.from('csc_bewerbungen').update({ status: newStatus }).eq('id', id);
    if (error) throw error;
    b.status = newStatus; 
    b.status_geaendert_am = new Date().toISOString();
    b.status_geaendert_von = session.user.email;
    renderList(); selectBewerbung(id); renderStats();
    toast('Status auf "' + STATUS_LABELS[newStatus] + '" gesetzt');
  } catch (e) { toast('Fehler: ' + e.message, true); }
}

// Notiz speichern (onblur)
async function saveNotiz(id) {
  const b = bewerbungen.find(x => x.id === id);
  if (!b) return;
  const textarea = document.getElementById('notiz-textarea');
  if (!textarea) return;
  const newText = textarea.value;
  if (newText === (b.vorstand_notiz || '')) return;  // keine Änderung
  
  const hint = document.getElementById('notiz-save-hint');
  hint.textContent = 'Speichere...';
  hint.classList.remove('saved');
  
  try {
    const { error } = await sb.from('csc_bewerbungen')
      .update({ vorstand_notiz: newText })
      .eq('id', id);
    if (error) throw error;
    
    b.vorstand_notiz = newText;
    b.notiz_geaendert_am = new Date().toISOString();
    b.notiz_geaendert_von = session.user.email;
    
    // Meta-Info aktualisieren
    const meta = document.getElementById('notiz-meta');
    if (meta) {
      meta.textContent = 'zuletzt: ' + new Date().toLocaleString('de-DE', {day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'}) + ' · ' + session.user.email;
    }
    
    hint.textContent = '✓ Gespeichert';
    hint.classList.add('saved');
    setTimeout(() => {
      hint.textContent = 'Speichert automatisch beim Verlassen des Felds';
      hint.classList.remove('saved');
    }, 2500);
  } catch (e) {
    hint.textContent = 'Fehler: ' + e.message;
    toast('Notiz konnte nicht gespeichert werden: ' + e.message, true);
  }
}

// CSV Export — alle aktuell sichtbaren Bewerbungen
function exportCsv() {
  // Aktuelle Filter anwenden um zu wissen was sichtbar ist
  const statusFilter = document.getElementById('filter-status').value;
  const vereinFilter = document.getElementById('filter-verein').value;
  const searchTerm = document.getElementById('filter-search').value.toLowerCase().trim();
  
  let filtered = bewerbungen;
  if (statusFilter) filtered = filtered.filter(b => (b.status || 'eingegangen') === statusFilter);
  if (vereinFilter) filtered = filtered.filter(b => b.verein_id === vereinFilter);
  if (searchTerm) {
    filtered = filtered.filter(b => {
      const hay = [b.vorname, b.nachname, b.email, b.adresse?.ort, b.adresse?.plz, vereine[b.verein_id]?.name].filter(Boolean).join(' ').toLowerCase();
      return hay.includes(searchTerm);
    });
  }
  
  if (filtered.length === 0) {
    toast('Keine Bewerbungen zum Exportieren', true);
    return;
  }
  
  // CSV-Spalten — vollständige Bewerber-Daten für Excel/Vorstand
  const headers = [
    'Eingegangen', 'Status', 'Bewerbungs-ID', 'Verein', 'Bundesland',
    'Vorname', 'Nachname', 'E-Mail', 'Telefon',
    'Geburtsdatum', 'Geburtsort', 'Staatsangehörigkeit',
    'PLZ', 'Stadt', 'Straße',
    'Wohnsitz DE 6 Mon.', 'Volljährig', 'Nicht-EU', 'Arbeitserlaubnis', 'CSC-Mitglied',
    'Rollen', 'Anstellungsform', 'Standorte',
    'Motivation',
    'Stunden min', 'Stunden max', 'Frühester Einstieg', 'Kündigungsfrist',
    'Max Anfahrt Ausgabe', 'Max Anfahrt Anbau',
    'Wochenende', 'Feiertag', 'Nacht', 'Jobticket', 'Fahrzeug', 'Führerschein',
    'Wunsch-Zeiten', 'Sperrzeiten',
    'Probearbeit bereit', 'Probearbeit Dauer', 'Probearbeit Orte', 'Probearbeit Anmerkung',
    'Bildung', 'Letzte Tätigkeit', 'Vorerfahrung',
    'Sprachen', 'Soft-Skills',
    'Sachkunde Prävention', 'Sicherheits-Nachweis',
    'Sucht relevant', 'Sucht Details',
    'Schwerbehinderung', 'GdB', 'Einschränkungen', 'Anpassungen',
    'Steuer-ID', 'SV-Nr.', 'Krankenkasse', 'IBAN',
    'DSGVO-Zustimmung', 'DSGVO-Zeitstempel',
    'Notiz', 'Notiz geändert am', 'Notiz von',
    'Status geändert am', 'Status geändert von'
  ];
  
  const rows = filtered.map(b => {
    const v = vereine[b.verein_id];
    const rollen = Array.isArray(b.rollen) ? b.rollen.map(r => ROLE_LABELS[r] || r).join('; ') : '';
    const anstellung = Array.isArray(b.anstellungsformen) ? b.anstellungsformen.join('; ') : '';
    const standorte = Array.isArray(b.rollen_standorte) ? b.rollen_standorte.join('; ') : '';
    const anfA = b.max_anfahrt ? (ANFAHRT_LABELS_AUSGABE[String(b.max_anfahrt)] || b.max_anfahrt) : '';
    const anfB = b.max_anfahrt_anbau ? (ANFAHRT_LABELS_ANBAU[String(b.max_anfahrt_anbau)] || b.max_anfahrt_anbau) : '';
    const fs = Array.isArray(b.fuehrerschein) ? b.fuehrerschein.join('; ') : (b.fuehrerschein === true ? 'Ja' : (b.fuehrerschein === false ? 'Nein' : ''));
    const probeOrte = Array.isArray(b.probearbeit_orte) ? b.probearbeit_orte.join('; ') : '';
    const sprachen = b.sprachen ? Object.entries(b.sprachen).filter(([k,v]) => v && v !== '').map(([k,v]) => (SPRACHEN_LABELS[k] || k) + ': ' + (SPRACH_LEVEL[v] || v)).join('; ') : '';
    const softSkills = b.soft_skills ? Object.entries(b.soft_skills).filter(([k,v]) => v > 0).map(([k,v]) => (SOFT_SKILL_LABELS[k] || k) + ': ' + v + '/5').join('; ') : '';
    
    return [
      b.eingegangen_am ? new Date(b.eingegangen_am).toLocaleDateString('de-DE') : '',
      STATUS_LABELS[b.status || 'eingegangen'] || b.status || '',
      b.id ? b.id.slice(0, 8).toUpperCase() : '',
      v?.name || '', v?.bundesland || '',
      b.vorname || '', b.nachname || '', b.email || '', b.telefon || '',
      b.geburtsdatum ? new Date(b.geburtsdatum).toLocaleDateString('de-DE') : '',
      b.geburtsort || '', b.staatsangehoerigkeit || '',
      b.adresse?.plz || '', b.adresse?.ort || b.adresse?.stadt || '', b.adresse?.strasse || '',
      b.wohnsitz_d_6_monate === true ? 'Ja' : (b.wohnsitz_d_6_monate === false ? 'Nein' : ''),
      b.ist_volljaehrig === true ? 'Ja' : (b.ist_volljaehrig === false ? 'Nein' : ''),
      b.ist_nicht_eu === true ? 'Ja' : (b.ist_nicht_eu === false ? 'Nein' : ''),
      b.arbeitserlaubnis === true ? 'Ja' : (b.arbeitserlaubnis === false ? 'Nein' : ''),
      b.ist_mitglied || '',
      rollen, anstellung, standorte,
      b.motivation || '',
      b.wunsch_stunden_min || '', b.wunsch_stunden_max || '',
      b.eintritt_fruehestens ? new Date(b.eintritt_fruehestens).toLocaleDateString('de-DE') : '',
      b.kuendigungsfrist || '',
      anfA, anfB,
      b.bereit_we === true ? 'Ja' : (b.bereit_we === false ? 'Nein' : ''),
      b.bereit_feiertag === true ? 'Ja' : (b.bereit_feiertag === false ? 'Nein' : ''),
      b.bereit_nacht === true ? 'Ja' : (b.bereit_nacht === false ? 'Nein' : ''),
      b.jobticket || '',
      b.eigenes_fahrzeug === true ? 'Ja' : (b.eigenes_fahrzeug === false ? 'Nein' : ''),
      fs,
      b.wunsch_zeiten || '', b.sperrzeiten || '',
      b.probearbeit_bereit === true ? 'Ja' : (b.probearbeit_bereit === false ? 'Nein' : ''),
      b.probearbeit_dauer || '', probeOrte, b.probearbeit_anmerkung || '',
      b.bildungsabschluss || '', b.letzte_taetigkeit || '', b.vorerfahrung || '',
      sprachen, softSkills,
      b.praevention_sachkunde || '',
      b.sicherheit_nachweis === true ? 'Ja' : (b.sicherheit_nachweis === false ? 'Nein' : ''),
      b.sucht_relevant || '', b.sucht_details || '',
      b.schwerbehinderung || '', b.schwerbehinderung_gdb || '',
      b.schwerbehinderung_einschr || '', b.schwerbehinderung_anpassungen || '',
      b.steuer_id || '', b.sv_nummer || '', b.krankenkasse || '', b.iban || '',
      b.dsgvo_zustimmung === true ? 'Ja' : '',
      b.dsgvo_zeitstempel ? new Date(b.dsgvo_zeitstempel).toLocaleString('de-DE') : '',
      b.vorstand_notiz || '',
      b.notiz_geaendert_am ? new Date(b.notiz_geaendert_am).toLocaleString('de-DE') : '',
      b.notiz_geaendert_von || '',
      b.status_geaendert_am ? new Date(b.status_geaendert_am).toLocaleString('de-DE') : '',
      b.status_geaendert_von || ''
    ];
  });
  
  // CSV bauen (Excel-kompatibel: Semikolon-getrennt, UTF-8 BOM)
  const escapeCsv = (val) => {
    if (val == null) return '';
    const s = String(val);
    if (s.includes(';') || s.includes('"') || s.includes('\n') || s.includes('\r')) {
      return '"' + s.replace(/"/g, '""') + '"';
    }
    return s;
  };
  
  const csv = '\uFEFF' + // UTF-8 BOM für Excel
    headers.map(escapeCsv).join(';') + '\r\n' +
    rows.map(r => r.map(escapeCsv).join(';')).join('\r\n');
  
  // Download triggern
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const today = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `mariana-bewerbungen-${today}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  
  toast(`${filtered.length} Bewerbungen exportiert`);
}

async function downloadAnhang(storagePfad, filename) {
  if (!storagePfad) { toast('Kein Storage-Pfad hinterlegt', true); return; }
  try {
    const { data, error } = await sb.storage.from('bewerbung-anhaenge').createSignedUrl(storagePfad, 60);
    if (error) throw error;
    const a = document.createElement('a'); a.href = data.signedUrl; a.download = filename; a.click();
  } catch (e) { toast('Download-Fehler: ' + e.message, true); }
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

let toastTimer = null;
function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show' + (isError ? ' error' : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

document.addEventListener('DOMContentLoaded', () => {
  if (!SUPABASE_ANON_KEY || SUPABASE_ANON_KEY === 'BITTE_HIER_DEN_ANON_KEY_EINFUEGEN') {
    const msg = document.getElementById('login-msg');
    msg.textContent = 'Konfigurationsfehler: SUPABASE_ANON_KEY fehlt im Quelltext.';
    msg.className = 'login-msg error';
    msg.style.display = 'block';
    document.getElementById('login-btn').disabled = true;
    return;
  }
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: true }
  });
  init();
});
