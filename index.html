<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <meta name="description" content="Bewerbungsportal Mariana Cannabis — geschlossen.">
  <title>Mariana Cannabis — Bewerbungsportal geschlossen</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter+Tight:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      /* Earth tones — gedämpftes Olivgrün als Anker */
      --olive-900: #2c3320;
      --olive-700: #4a5a32;
      --olive-500: #6b7a4a;
      --olive-300: #a8b386;
      --olive-100: #e3e6d3;
      --olive-50:  #f0f2e3;

      /* Sand-Hintergründe */
      --sand-50:  #faf6ed;
      --sand-100: #f5efe0;
      --sand-200: #ebe2cb;
      --sand-300: #d8c9a3;

      /* Akzente */
      --terracotta: #c87a5a;
      --terracotta-dark: #9c5b3f;
      --cream: #fdfaf2;
      --ink: #2a2a26;
      --ink-soft: #5a5a52;
      --ink-mute: #8b8b80;

      /* Layout */
      --radius-md: 8px;
      --radius-lg: 14px;
      --shadow-soft: 0 1px 3px rgba(44, 51, 32, 0.06), 0 4px 12px rgba(44, 51, 32, 0.04);
    }

    * { box-sizing: border-box; }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 400;
      line-height: 1.55;
      color: var(--ink);
      background: var(--sand-50);
      -webkit-font-smoothing: antialiased;
      font-size: 16px;
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
      padding-bottom: env(safe-area-inset-bottom);
      min-height: 100vh;
    }

    /* Subtile organische Hintergrund-Textur */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle at 15% 25%, rgba(168, 179, 134, 0.08) 0%, transparent 45%),
                        radial-gradient(circle at 85% 75%, rgba(200, 122, 90, 0.05) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* Header */
    .app-header {
      position: relative;
      z-index: 1;
      padding: 2rem 1.5rem 1.5rem;
      border-bottom: 1px solid var(--sand-200);
      background: var(--cream);
    }

    .app-header-inner {
      max-width: 760px;
      margin: 0 auto;
      display: flex;
      align-items: flex-start;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .brand-block { flex: 1; min-width: 200px; }

    .brand-name {
      font-family: 'DM Serif Display', serif;
      font-size: 1.65rem;
      font-weight: 400;
      color: var(--olive-900);
      margin: 0 0 0.15rem;
      line-height: 1.1;
      letter-spacing: -0.01em;
    }

    .brand-subtitle {
      font-size: 0.9rem;
      color: var(--olive-700);
      font-style: italic;
      margin: 0;
    }

    /* Main */
    main {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem 1.5rem 4rem;
    }

    .notice-card {
      background: var(--cream);
      border: 1px solid var(--sand-200);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-soft);
      padding: 2.5rem 2rem;
    }

    .notice-card h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.85rem;
      font-weight: 400;
      color: var(--olive-900);
      margin: 0 0 1.5rem;
      line-height: 1.2;
      letter-spacing: -0.01em;
    }

    .notice-card p {
      font-size: 1.05rem;
      color: var(--ink);
      margin: 0 0 1rem;
    }

    .notice-card p.lead {
      font-size: 1.15rem;
      color: var(--olive-700);
      margin-bottom: 1.5rem;
    }

    .divider {
      height: 1px;
      background: var(--sand-200);
      border: 0;
      margin: 2rem 0 1.5rem;
    }

    .footer-note {
      font-size: 0.9rem;
      color: var(--ink-soft);
      margin: 0;
    }

    .footer-note a {
      color: var(--olive-700);
      text-decoration: none;
      border-bottom: 1px solid var(--olive-300);
      padding-bottom: 1px;
      transition: color 0.15s ease, border-color 0.15s ease;
    }

    .footer-note a:hover {
      color: var(--olive-900);
      border-color: var(--olive-700);
    }

    /* Mobile */
    @media (max-width: 540px) {
      main { padding: 2rem 1rem 3rem; }
      .notice-card { padding: 2rem 1.5rem; }
      .notice-card h2 { font-size: 1.5rem; }
      .brand-name { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <div class="app-header-inner">
      <div class="brand-block">
        <h1 class="brand-name">Mariana Cannabis</h1>
        <p class="brand-subtitle">Bewerbungsportal</p>
      </div>
    </div>
  </header>

  <main>
    <section class="notice-card">
      <h2>Bewerbungsportal geschlossen</h2>

      <p class="lead">
        Bewerbungen laufen weiterhin — aber zurzeit nicht über dieses Portal.
      </p>

      <p>
        Wenn du dich bei einem Cannabis Social Club bewerben möchtest, wende dich bitte direkt an den Vorstand deines Wunschvereins.
      </p>
    </section>
  </main>
</body>
</html>
